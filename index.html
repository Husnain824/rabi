<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>PharmaPulse by Rabi — Pakistan Drug Intelligence</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234f46e5'/><text y='.9em' font-size='72' x='50%' text-anchor='middle' dominant-baseline='top' fill='white'>⚕</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#4f46e5;--primary-light:#818cf8;--primary-dark:#4338ca;
  --secondary:#f59e0b;--accent:#10b981;--purple:#7c3aed;--rose:#f472b6;
  --bg:#0b0f1a;--bg2:#131b2e;--bg3:#1a2642;--bg4:#22305a;
  --text:#f0f4ff;--text2:#b4c8e8;--text3:#6a80a8;
  --border:rgba(79,70,229,0.15);--border2:rgba(79,70,229,0.30);
  --card:rgba(19,27,46,0.92);--shadow:0 12px 48px rgba(0,0,0,0.5);
  --glow:0 0 30px rgba(79,70,229,0.15);--rad:16px;--rad-sm:10px;
  --nav:64px;
}
:root.light{
  --bg:#f3f6fc;--bg2:#fff;--bg3:#eef2f9;--bg4:#e0e8f5;
  --text:#0f172a;--text2:#334155;--text3:#64748b;
  --border:rgba(79,70,229,0.10);--border2:rgba(79,70,229,0.20);
  --card:rgba(255,255,255,0.95);--shadow:0 8px 30px rgba(79,70,229,0.08);
  --glow:0 0 24px rgba(79,70,229,0.06);
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(79,70,229,0.25);border-radius:4px}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* NAV */
.nav{display:flex;align-items:center;height:var(--nav);padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px;position:relative;z-index:100;backdrop-filter:blur(12px)}
.nav-logo{display:flex;align-items:center;gap:8px;flex-shrink:0;cursor:pointer;text-decoration:none}
.nav-logo-ic{width:40px;height:40px;background:linear-gradient(135deg,var(--primary),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;box-shadow:0 4px 12px rgba(79,70,229,0.3)}
.nav-logo-txt{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:700;color:var(--text)}
.nav-logo-txt span{color:var(--secondary)}
.nav-logo-sub{font-size:9px;font-weight:500;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase}
.nav-back{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;transition:all 0.2s;flex-shrink:0}
.nav-back:hover{border-color:var(--primary-light);color:var(--primary-light)}
.nav-sw{flex:1;max-width:480px;position:relative;min-width:100px}
.nav-inp{width:100%;padding:9px 70px 9px 36px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:all 0.3s}
.nav-inp:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(79,70,229,0.12)}
.nav-inp::placeholder{color:var(--text3);font-size:13px}
.nav-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.nav-go{position:absolute;right:4px;top:50%;transform:translateY(-50%);padding:5px 14px;background:linear-gradient(135deg,var(--primary),var(--purple));border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s}
.nav-go:hover{transform:translateY(-50%) scale(1.04);box-shadow:0 4px 14px rgba(79,70,229,0.35)}
.sugg-drop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rad-sm);box-shadow:var(--shadow);z-index:300;overflow:hidden;max-height:240px;overflow-y:auto;display:none}
.sugg-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;font-size:14px;color:var(--text);transition:background 0.12s;border-bottom:1px solid var(--border)}
.sugg-item:last-child{border:none}
.sugg-item:hover,.sugg-item.sel{background:rgba(79,70,229,0.07)}
.sugg-cls{font-size:11px;color:var(--text3);margin-left:auto;white-space:nowrap;background:var(--bg3);padding:2px 8px;border-radius:12px}
.nav-acts{display:flex;align-items:center;gap:4px;flex-shrink:0}
.nav-btn{width:38px;height:38px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.2s;flex-shrink:0}
.nav-btn:hover{border-color:var(--primary-light);color:var(--primary-light);background:rgba(79,70,229,0.05)}
.nav-mode{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:3px}
.nav-mode-btn{padding:4px 12px;border-radius:7px;border:none;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;background:none;color:var(--text3);font-family:'Inter',sans-serif}
.nav-mode-btn.on{background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff;box-shadow:0 2px 10px rgba(79,70,229,0.25)}
.nav-ham{display:none;width:38px;height:38px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--text2);cursor:pointer;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 0 30px}

/* AI BANNER */
.ai-banner{display:flex;align-items:center;gap:10px;padding:9px 16px;background:rgba(79,70,229,0.06);border-bottom:1px solid var(--border);font-size:12px;color:var(--text3);flex-shrink:0}
.ai-badge{padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.2)}

/* HERO */
.hero{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - var(--nav) - 34px);padding:40px 20px 50px;text-align:center;position:relative}
.hero-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.hero-bg .sh{position:absolute;border-radius:50%;opacity:0.06;filter:blur(60px)}
.hero-bg .sh:nth-child(1){width:400px;height:400px;background:var(--primary);top:-100px;right:-80px}
.hero-bg .sh:nth-child(2){width:300px;height:300px;background:var(--secondary);bottom:-60px;left:-60px}
.hero-ct{position:relative;z-index:1;max-width:620px;width:100%}
.hero-badge{display:inline-block;padding:4px 16px;background:rgba(79,70,229,0.10);border:1px solid rgba(79,70,229,0.20);border-radius:20px;font-size:12px;font-weight:600;color:var(--primary-light);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:16px}
.hero-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:42px;font-weight:800;line-height:1.1;background:linear-gradient(135deg,var(--text) 0%,var(--primary-light) 40%,var(--secondary) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.hero-sub{font-size:16px;color:var(--text2);margin-bottom:20px}
.hero-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
.h-stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 20px;text-align:center}
.h-stat .n{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:700;color:var(--primary-light)}
.h-stat .l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;margin-top:2px}
.hero-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:18px}
.chip{padding:5px 14px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:13px;color:var(--text2);cursor:pointer;transition:all 0.2s;font-weight:500}
.chip:hover{border-color:var(--primary-light);color:var(--primary-light);transform:translateY(-2px)}
.hero-tools{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.tool-btn{display:flex;align-items:center;gap:7px;padding:9px 18px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;font-family:'Inter',sans-serif}
.tool-btn:hover{border-color:var(--primary-light);color:var(--primary-light);transform:translateY(-2px)}
.tool-btn.green:hover{border-color:var(--accent);color:var(--accent)}
.tool-btn.amber:hover{border-color:var(--secondary);color:var(--secondary)}
.hero-disc{max-width:500px;margin:0 auto;padding:10px 16px;background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.12);border-radius:10px;font-size:12px;color:rgba(245,158,11,0.7);line-height:1.6}

/* QUICK CARD */
.qcard{max-width:900px;margin:20px auto;padding:0 16px}
.qcard-inner{background:var(--card);border:1px solid var(--border);border-radius:var(--rad);overflow:hidden;box-shadow:var(--glow);animation:fadeSlide 0.3s ease}
.qcard-hero{background:linear-gradient(135deg,var(--bg3),var(--bg4));padding:20px 24px;border-bottom:1px solid var(--border)}
.qcard-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:30px;font-weight:800;color:var(--text);margin-bottom:4px}
.qcard-alias{font-size:13px;color:var(--primary-light);margin-bottom:4px}
.qcard-cls{display:inline-block;padding:3px 12px;background:rgba(79,70,229,0.10);border:1px solid rgba(79,70,229,0.15);border-radius:14px;font-size:12px;font-weight:600;color:var(--primary-light);margin-bottom:10px}
.qcard-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.qtag{padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.qt-blue{background:rgba(79,70,229,0.12);color:var(--primary-light);border:1px solid rgba(79,70,229,0.15)}
.qt-amber{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.15)}
.qt-green{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.15)}
.qt-rose{background:rgba(244,114,182,0.12);color:#f472b6;border:1px solid rgba(244,114,182,0.15)}
.qcard-acts{display:flex;flex-wrap:wrap;gap:7px;padding:14px 24px;border-bottom:1px solid var(--border);background:rgba(79,70,229,0.02)}
.qa{padding:6px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all 0.2s;font-family:'Inter',sans-serif;font-weight:500}
.qa:hover{border-color:var(--primary-light);color:var(--primary-light);background:rgba(79,70,229,0.05)}
.qa.primary{background:linear-gradient(135deg,var(--primary),var(--purple));border-color:transparent;color:#fff}
.qa.primary:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(79,70,229,0.3)}
.qcard-body{padding:20px 24px}
.qcard-summary{font-size:15px;color:var(--text2);line-height:1.85;margin-bottom:16px}
.qcard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.qg-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rad-sm);padding:12px}
.qg-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:6px}
.qg-val{font-size:13px;color:var(--text2);line-height:1.5}
.qcard-uses{margin-bottom:16px}
.sec-label{font-size:11px;font-weight:700;color:var(--primary-light);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.mini-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.mini-list li{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--text2);line-height:1.6}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:7px}
.qcard-brands{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.brand-pill{padding:4px 12px;background:rgba(79,70,229,0.08);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--primary-light);font-weight:600}
.detail-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--primary),var(--purple));border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.detail-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(79,70,229,0.35)}
.detail-btn.loading{opacity:0.7;cursor:not-allowed;transform:none}
.ai-powered-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:linear-gradient(135deg,rgba(79,70,229,0.15),rgba(124,58,237,0.15));border:1px solid rgba(79,70,229,0.2);border-radius:20px;font-size:10px;font-weight:700;color:var(--primary-light)}

/* FULL DETAIL SECTIONS */
.drug-ct{max-width:900px;margin:0 auto;padding:20px 16px 60px}
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rad);overflow:hidden;margin-bottom:16px;box-shadow:var(--glow)}
.sec-head{display:flex;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid var(--border);background:rgba(79,70,229,0.02)}
.sec-head .acc{width:4px;height:24px;border-radius:2px;flex-shrink:0}
.sec-head .em{font-size:18px}
.sec-head .tt{font-size:15px;font-weight:700;color:var(--text);flex:1}
.sec-body{padding:15px 20px}
.sec-body p{font-size:14px;color:var(--text2);line-height:1.8}
.sec-body ul{list-style:none;padding:0}
.sec-body li{padding:6px 0;font-size:14px;color:var(--text2);display:flex;gap:10px;align-items:flex-start;border-bottom:1px solid rgba(255,255,255,0.03);line-height:1.65}
.sec-body li:last-child{border:none}
.sec-body li .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:8px}
.sub-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin:12px 0 6px}
.sub-lbl:first-child{margin-top:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gi{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rad-sm);padding:11px 13px}
.gi .lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:4px}
.gi .val{font-size:13px;color:var(--text2);line-height:1.6}
.brand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px}
.bc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rad-sm);padding:11px 13px;transition:all 0.2s}
.bc:hover{border-color:var(--primary-light);background:rgba(79,70,229,0.04)}
.bc .bn{font-size:13px;font-weight:700;color:var(--primary-light);margin-bottom:2px}
.bc .bs{font-size:12px;color:var(--text2)}
.bc .bco{font-size:11px;color:var(--text3)}
.bc .btags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.bc .btg{padding:1px 7px;background:rgba(79,70,229,0.08);border:1px solid rgba(79,70,229,0.12);border-radius:7px;font-size:10px;color:var(--primary-light);font-weight:500}
.int-row{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.int-row:last-child{border:none}
.int-badge{padding:2px 8px;border-radius:7px;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px}
.int-maj{background:rgba(244,114,182,0.12);color:#f472b6;border:1px solid rgba(244,114,182,0.2)}
.int-mod{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.2)}
.int-txt{font-size:13px;color:var(--text2);line-height:1.6}
.faq-item{border-bottom:1px solid var(--border);padding:11px 0}
.faq-item:first-child{padding-top:0}
.faq-item:last-child{border:none;padding-bottom:0}
.faq-q{font-size:14px;font-weight:600;color:var(--text);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px}
.faq-q .arr{color:var(--primary-light);font-size:14px;transition:transform 0.25s;flex-shrink:0}
.faq-q .arr.open{transform:rotate(180deg)}
.faq-a{font-size:14px;color:var(--text2);line-height:1.7;padding-top:7px;display:none}
.faq-a.open{display:block}
.ref-item{display:flex;gap:10px;padding:7px 11px;margin:4px 0;background:rgba(79,70,229,0.04);border-left:3px solid var(--primary-light);border-radius:7px;font-size:13px;color:var(--text3)}
.ref-item .n{color:var(--primary-light);font-weight:700;flex-shrink:0;min-width:20px;font-size:11px;padding-top:1px}
.ref-item a{color:var(--primary-light);text-decoration:none;font-weight:500;border-bottom:1.5px solid rgba(79,70,229,0.2)}
.ref-item a:hover{border-bottom-color:var(--primary-light);color:var(--secondary)}
.disc-box{background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.15);border-radius:var(--rad-sm);padding:11px 13px;margin-top:10px}
.disc-box p{font-size:12px;color:rgba(245,158,11,0.7);line-height:1.7}

/* STRUCTURE */
.struct-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:4px 0}
.struct-tabs{display:flex;gap:8px;background:var(--bg3);padding:3px;border-radius:10px;border:1px solid var(--border)}
.struct-tab{padding:6px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--text3);font-family:'Inter',sans-serif}
.struct-tab.on{background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff;box-shadow:0 2px 10px rgba(79,70,229,0.25)}
.struct-img-ct{width:100%;min-height:260px;display:flex;flex-direction:column;justify-content:center;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rad-sm);overflow:hidden;position:relative;gap:10px}
.struct-img-ct img{max-width:100%;max-height:360px;display:none;object-fit:contain}
.struct-img-ct .ph{color:var(--text3);font-size:14px;text-align:center;padding:20px}
.struct-img-ct .spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--primary-light);border-radius:50%;animation:spin 0.7s linear infinite;display:none}
.struct-img-ct iframe{width:100%;height:400px;border:none;border-radius:7px;display:none}
.struct-credit{font-size:11px;color:var(--text3);text-align:center}
.struct-credit a{color:var(--primary-light);text-decoration:none;border-bottom:1px solid rgba(79,70,229,0.2)}

/* PILL FINDER */
.pill-page{max-width:760px;margin:0 auto;padding:24px 16px 60px}
.pill-tabs{display:flex;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:20px;width:fit-content}
.pill-tab{padding:7px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--text3);font-family:'Inter',sans-serif}
.pill-tab.on{background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff;box-shadow:0 2px 8px rgba(79,70,229,0.25)}
.pill-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rad);padding:22px;box-shadow:var(--glow);margin-bottom:16px}
.pill-card h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:5px}
.pill-card p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px}
.pill-row{display:flex;gap:10px;flex-wrap:wrap}
.pill-inp{flex:1;min-width:180px;padding:11px 15px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:all 0.3s}
.pill-inp:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(79,70,229,0.08)}
.pill-inp::placeholder{color:var(--text3)}

/* MCQ */

<script>
// ─── CONFIG ──────────────────────────────────────────────
const WORKER = 'https://check-ai.noorhusnain791.workers.dev';
const GROQ_MODEL = 'llama-3.3-70b-versatile';
const GEMINI_MODEL = 'gemini-2.5-flash';

async function callAI(prompt, useGemini=false, maxT=1500){
  const body = useGemini
    ? {provider:'gemini', model:GEMINI_MODEL, messages:[{role:'user',content:prompt}], max_tokens:maxT}
    : {model:GROQ_MODEL, messages:[{role:'user',content:prompt}], max_tokens:maxT};
  const r = await fetch(WORKER, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  if(!r.ok) throw new Error(await r.text()||'Worker error');
  const d = await r.json();
  if(d.error) throw new Error(d.error);
  return d.content?.[0]?.text || '';
}

async function callGeminiVision(imageBase64, mimeType, prompt){
  const r = await fetch(WORKER, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'ocr', imageBase64, mimeType, provider:'gemini',
      customPrompt: prompt || 'Identify this medicine/pill. Return JSON: {"name":"...","class":"...","strength":"...","manufacturer":"...","uses":"...","warning":"..."}'})
  });
  if(!r.ok) throw new Error('Image scan failed');
  const d = await r.json();
  return d.text||'';
}

// ─── STATE ───────────────────────────────────────────────
const S = {
  mode:'pro', currentDrug:null, currentDrugFull:null,
  history:[], favs:[], query:'', drawerTab:'history',
  openFAQs:{}, lastAiFallback:false
};
const MCQ_S = { active:false, med:'', mcqs:[], idx:0, score:0, answered:false, total:10, complete:false, count:10, generating:false };

const MEDS = [
  {name:'Azithromycin',cls:'Macrolide antibiotic'},{name:'Metformin',cls:'Biguanide antidiabetic'},
  {name:'Amoxicillin',cls:'Penicillin antibiotic'},{name:'Losartan',cls:'ARB antihypertensive'},
  {name:'Omeprazole',cls:'Proton pump inhibitor'},{name:'Cefixime',cls:'3rd gen cephalosporin'},
  {name:'Paracetamol',cls:'Analgesic/antipyretic'},{name:'Atorvastatin',cls:'HMG-CoA reductase inhibitor'},
  {name:'Amlodipine',cls:'Calcium channel blocker'},{name:'Ciprofloxacin',cls:'Fluoroquinolone antibiotic'},
  {name:'Ibuprofen',cls:'NSAID'},{name:'Salbutamol',cls:'Beta-2 agonist'},{name:'Furosemide',cls:'Loop diuretic'},
  {name:'Pantoprazole',cls:'Proton pump inhibitor'},{name:'Clarithromycin',cls:'Macrolide antibiotic'},
  {name:'Metronidazole',cls:'Antiprotozoal/antibacterial'},{name:'Doxycycline',cls:'Tetracycline antibiotic'},
  {name:'Warfarin',cls:'Vitamin K antagonist'},{name:'Aspirin',cls:'Antiplatelet/NSAID'},
  {name:'Enalapril',cls:'ACE inhibitor'},{name:'Fluconazole',cls:'Antifungal azole'},
  {name:'Diclofenac',cls:'NSAID'},{name:'Prednisolone',cls:'Corticosteroid'},
  {name:'Tramadol',cls:'Opioid analgesic'},{name:'Clindamycin',cls:'Lincosamide antibiotic'},
  {name:'Bisoprolol',cls:'Beta-1 selective blocker'},{name:'Sildenafil',cls:'PDE-5 inhibitor'},
  {name:'Carbamazepine',cls:'Anticonvulsant'},{name:'Ceftriaxone',cls:'3rd gen cephalosporin'},
  {name:'Rifampicin',cls:'Antitubercular'},{name:'Isoniazid',cls:'Antitubercular'},
  {name:'Amiodarone',cls:'Class III antiarrhythmic'},{name:'Digoxin',cls:'Cardiac glycoside'},
  {name:'Spironolactone',cls:'K-sparing diuretic'},{name:'Glibenclamide',cls:'Sulfonylurea antidiabetic'},
  {name:'Levothyroxine',cls:'Thyroid hormone'},{name:'Atenolol',cls:'Beta-1 blocker'},
  {name:'Cetirizine',cls:'H1 antihistamine'},{name:'Ondansetron',cls:'5-HT3 antiemetic'},
  {name:'Levofloxacin',cls:'Fluoroquinolone antibiotic'},{name:'Esomeprazole',cls:'Proton pump inhibitor'},
];
const EXAMPLES = ['Azithromycin','Metformin','Amoxicillin','Omeprazole','Losartan','Paracetamol'];

// ─── INIT ────────────────────────────────────────────────
(function(){
  try{S.history=JSON.parse(localStorage.getItem('pp_hist')||'[]');}catch(e){S.history=[];}
  try{S.favs=JSON.parse(localStorage.getItem('pp_favs')||'[]');}catch(e){S.favs=[];}
  try{const m=localStorage.getItem('pp_mode');if(m)S.mode=m;}catch(e){}
  initTheme(); renderLanding(); updateModeUI();
})();

function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function isFav(n){return S.favs.some(f=>f.name.toLowerCase()===n.toLowerCase());}

// ─── THEME ───────────────────────────────────────────────
function toggleTheme(){
  const d=document.documentElement;
  const isD=!d.classList.contains('light');
  if(isD){d.classList.add('light');localStorage.setItem('pp_theme','light');document.getElementById('themeBtn').textContent='☀️';}
  else{d.classList.remove('light');localStorage.setItem('pp_theme','dark');document.getElementById('themeBtn').textContent='🌙';}
}
function initTheme(){
  if(localStorage.getItem('pp_theme')==='light'){document.documentElement.classList.add('light');document.getElementById('themeBtn').textContent='☀️';}
}
function setMode(m){S.mode=m;localStorage.setItem('pp_mode',m);updateModeUI();if(S.currentDrugFull)renderFullDetail(S.currentDrugFull);}
function updateModeUI(){
  document.getElementById('modePro').classList.toggle('on',S.mode==='pro');
  document.getElementById('modeLay').classList.toggle('on',S.mode==='lay');
}

// ─── LANDING ─────────────────────────────────────────────
function renderLanding(){
  MCQ_S.active=false;
  const total=parseInt(localStorage.getItem('pp_total')||'0');
  const unique=Object.keys(JSON.parse(localStorage.getItem('pp_counts')||'{}')).length;
  document.getElementById('main').innerHTML=`
  <div class="hero">

        <div class="h-stat"><div class="n">${S.favs.length}</div><div class="l">Favorites</div></div>
        <div class="h-stat"><div class="n">50+</div><div class="l">Classes</div></div>
      </div>
      <div class="hero-chips">${EXAMPLES.map(e=>`<span class="chip" onclick="doSearch('${e}')">${e}</span>`).join('')}</div>
      <div class="hero-tools">
        <button class="tool-btn" onclick="openMCQ()">📝 MCQ Practice</button>
        <button class="tool-btn green" onclick="openCompare()">⚖ Compare</button>

let navTimer,suggIdx=-1;

function onNavInp(val){
  S.query=val;clearTimeout(navTimer);
  if(!val.trim()){hideSugg();return;}
  navTimer=setTimeout(()=>showSugg(val),200);
}

async function showSugg(val){
  const dd=document.getElementById('suggDrop');if(!dd)return;
  suggIdx=-1;dd.style.display='block';
  dd.innerHTML='<div style="padding:10px;color:var(--text3);text-align:center;font-size:13px">⏳ Searching…</div>';
  try{
    const res=await fetchSugg(val);
    if(!res.length){hideSugg();return;}
    dd.innerHTML=res.map((m,i)=>`<div class="sugg-item" data-n="${esc(m.name)}" onmousedown="pickSugg('${m.name.replace(/'/g,"\\'")}')">💊 ${hl(m.name,val)}<span class="sugg-cls">${esc(m.cls||'')}</span></div>`).join('');
  }catch(e){dd.innerHTML='<div style="padding:10px;color:var(--text3);text-align:center;font-size:13px">⚠ Error</div>';}
}

function hideSugg(){clearTimeout(navTimer);const dd=document.getElementById('suggDrop');if(dd)dd.style.display='none';suggIdx=-1;}
function pickSugg(n){const i=document.getElementById('navInp');if(i)i.value=n;hideSugg();doSearch(n);}

function onNavKey(e){
  const dd=document.getElementById('suggDrop');
  const open=dd&&dd.style.display!=='none';
  if(!open){if(e.key==='Enter')triggerSearch();return;}
  const items=dd.querySelectorAll('.sugg-item');
  if(e.key==='ArrowDown'){e.preventDefault();suggIdx=Math.min(suggIdx+1,items.length-1);items.forEach((it,i)=>it.classList.toggle('sel',i===suggIdx));}
  else if(e.key==='ArrowUp'){e.preventDefault();suggIdx=Math.max(suggIdx-1,-1);items.forEach((it,i)=>it.classList.toggle('sel',i===suggIdx));}
  else if(e.key==='Enter'){e.preventDefault();if(suggIdx>=0&&items[suggIdx])pickSugg(items[suggIdx].dataset.n||'');else triggerSearch();}
  else if(e.key==='Escape')hideSugg();
}

function triggerSearch(){
  const i=document.getElementById('navInp');
  const q=i?i.value.trim():S.query.trim();
  if(!q)return;hideSugg();doSearch(q);
}

async function fetchSugg(q){
  const ql=q.toLowerCase();
  const local=MEDS.filter(m=>m.name.toLowerCase().startsWith(ql)||m.name.toLowerCase().includes(ql)).slice(0,5);
  if(local.length>=3)return local;
  try{
    const txt=await callAI(`Suggest 6 drugs matching "${q}" common in Pakistan. Return ONLY JSON: [{"name":"Drug","cls":"Class"}]. Real drugs only.`,false,200);
    const m=txt.match(/\[[\s\S]*?\]/);
    if(!m)return local;
    const api=JSON.parse(m[0]);
    const ln=local.map(l=>l.name.toLowerCase());
    return [...local,...(Array.isArray(api)?api:[]).filter(a=>!ln.includes(a.name.toLowerCase()))].slice(0,7);
  }catch(e){return local;}
}

async function doSearch(query){
  if(!query.trim())return;
  clearTimeout(navTimer);hideSugg();S.openFAQs={};MCQ_S.active=false;
  const i=document.getElementById('navInp');if(i)i.value=query;
  S.currentDrugFull=null;
  // Step 1: Quick card (Groq, fast)
  renderQuickLoading(query);
  try{
    const d=await fetchQuick(query);
    S.currentDrug=d;
    addHistory(d.medicine_name||query);
    trackSearch(d.medicine_name||query);
    renderQuickCard(d);
  }catch(e){renderError(e.message||'Search failed',query);}
}

function buildRefs(nm,d){
  const enc=encodeURIComponent(nm);
  const links=[
    {n:1,i:'🔬',l:'PubMed',h:`https://pubmed.ncbi.nlm.nih.gov/?term=${enc}+pharmacology`,desc:'Clinical research'},
    {n:2,i:'💊',l:'Drugs.com',h:`https://www.drugs.com/search.php?searchterm=${enc}`,desc:'Drug monographs'},
    {n:3,i:'🏥',l:'Medscape',h:`https://reference.medscape.com/search#q=${enc}`,desc:'Clinical pharmacology'},
    {n:4,i:'🇵🇰',l:'DRAP Pakistan',h:`https://www.drap.gov.pk/DrugSearch/Drug/Search?DrugName=${enc}`,desc:'Pakistan drug authority'},
  ];
  return links.map(l=>`<div class="ref-item"><span class="n">[${l.n}]</span><div><a href="${l.h}" target="_blank" rel="noopener">${l.i} ${l.l} — <em>${esc(nm)}</em></a><div style="font-size:11px;color:var(--text3);margin-top:2px">${l.desc}</div></div></div>`).join('')+`<div class="disc-box"><p>⚠ ${esc(d.disclaimer||d.safety_disclaimer||'Educational use only. Verify from authoritative references before clinical use.')}</p></div>`;
}

let structView='2d';
async function switchStruct(v){
  structView=v;

  document.getElementById('stab3d')?.classList.toggle('on',v==='3d');
  const nm=(S.currentDrugFull||S.currentDrug)?.medicine_name;

}
async function loadStructure(name,view){
  const img=document.getElementById('structImg'),fr=document.getElementById('structIframe'),ph=document.getElementById('structPh'),sp=document.getElementById('structSpin');
  if(!img)return;
  img.style.display='none';fr.style.display='none';ph.style.display='none';sp.style.display='block';
  try{
    const cid=await getCID(name);
    const pl=cid?`https://pubchem.ncbi.nlm.nih.gov/compound/${cid}`:`https://pubchem.ncbi.nlm.nih.gov/compound/${encodeURIComponent(name)}`;
    if(view==='2d'){
      const urls=[cid&&`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/PNG`,`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(name)}/PNG`].filter(Boolean);
      let t=0;
      const tryN=()=>{
        if(t>=urls.length){sp.style.display='none';ph.style.display='block';ph.innerHTML=`<span style="font-size:13px">Structure not available. </span><a href="${pl}" target="_blank" style="color:var(--primary-light)">View on PubChem ↗</a>`;return;}
        img.src='';img.onload=()=>{sp.style.display='none';img.style.display='block';};img.onerror=tryN;img.src=urls[t++];
      };tryN();
    }else{
      sp.style.display='none';
      const eu=cid?`https://pubchem.ncbi.nlm.nih.gov/compound/${cid}#section=3D-Conformer&embed=true`:`https://pubchem.ncbi.nlm.nih.gov/compound/${encodeURIComponent(name)}#section=3D-Conformer&embed=true`;
      fr.src=eu;fr.style.display='block';ph.style.display='block';ph.innerHTML='<span style="font-size:12px;color:var(--text3)">Loading 3D…</span>';
    }
  }catch(e){sp.style.display='none';ph.style.display='block';ph.textContent='Load failed: '+e.message;}
}
async function getCID(n){
  try{const r=await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(n)}/cids/JSON`);const d=await r.json();return d?.IdentifierList?.CID?.[0]||null;}catch(e){return null;}
}

async function processPillImage(file){
  const res=document.getElementById('pillResult');
  const ct=document.getElementById('pillTabCont');

  const url=URL.createObjectURL(file);
  ct.innerHTML=`<div class="pill-card"><img class="img-preview" src="${url}"/><div class="ld" style="padding:16px"><div class="spin2"></div><div style="font-size:13px;color:var(--text2)">Gemini Vision image analyze kar raha hai…</div></div></div>`;
  res.innerHTML='';

    const prompt=`You are a pharmaceutical expert for Pakistan. Analyze this medicine image (tablet, capsule, strip, or box). Identify the medicine shown. Return ONLY raw JSON: {"name":"Generic/Brand Name","generic":"Generic Name","class":"Drug Class","strength":"","manufacturer":"","uses":"1-2 lines","warning":"","confidence":"high/medium/low","what_i_see":"describe what is visible in image"}`;

    res.innerHTML=`<div style="padding:14px;background:rgba(244,114,182,0.06);border:1px solid rgba(244,114,182,0.15);border-radius:var(--rad);color:#f472b6;text-align:center">⚠ Image scan failed: ${esc(e.message)}</div>`;
  }
}

async function compressImg(file){
  return new Promise(res=>{
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=1200;const r=Math.min(MAX/Math.max(img.width,img.height),1);
      const c=document.createElement('canvas');c.width=Math.round(img.width*r);c.height=Math.round(img.height*r);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      c.toBlob(blob=>{URL.revokeObjectURL(url);const rd=new FileReader();rd.onload=()=>res({base64:rd.result.split(',')[1],mimeType:'image/jpeg',size:blob.size});rd.readAsDataURL(blob);},'image/jpeg',0.85);
    };img.onerror=()=>{URL.revokeObjectURL(url);res(null);};img.src=url;
  });
}

async function genMCQs(){
  const med=MCQ_S.med.trim()||document.getElementById('mcqInp')?.value.trim();
  if(!med){alert('Medicine select karo pehle');return;}
  if(MCQ_S.generating)return;
  MCQ_S.generating=true;MCQ_S.complete=false;MCQ_S.idx=0;MCQ_S.score=0;MCQ_S.answered=false;
  const ct=document.getElementById('mcqQuizCt');if(!ct)return;
  ct.innerHTML=`<div class="ld"><div class="spin2"></div><p style="color:var(--text2);font-size:13px">Generating ${MCQ_S.count} MCQs for <strong>${esc(med)}</strong>…</p></div>`;
  const prompt=`Generate ${MCQ_S.count} pharmacology MCQs about "${med}" for pharmacy/medical students in Pakistan. Cover: mechanism, dosing, interactions, adverse effects, contraindications, clinical use, PK. Return ONLY raw JSON array: [{"question":"...","options":{"A":"...","B":"...","C":"...","D":"..."},"correct":"A","explanation":"brief"}]`;
  try{
    let txt;
    try{txt=await callAI(prompt,true,4000);}
    catch(e){txt=await callAI(prompt,false,4000);}
    const m=txt.match(/\[[\s\S]*\]/);
    if(!m)throw new Error('No JSON array found');
    MCQ_S.mcqs=JSON.parse(m[0]);MCQ_S.total=MCQ_S.mcqs.length;
    renderMCQQ();
  }catch(e){ct.innerHTML=`<div style="text-align:center;padding:20px;color:#f472b6">⚠ Failed: ${esc(e.message)}<br><button onclick="genMCQs()" style="margin-top:10px;padding:6px 16px;background:rgba(79,70,229,0.08);border:1px solid rgba(79,70,229,0.2);border-radius:8px;color:var(--primary-light);cursor:pointer;font-family:'Inter',sans-serif;font-size:13px">↺ Retry</button></div>`;}
  finally{MCQ_S.generating=false;}
}

  if(MCQ_S.complete||MCQ_S.idx>=MCQ_S.mcqs.length){MCQ_S.complete=true;renderMCQRes(ct);return;}
  const q=MCQ_S.mcqs[MCQ_S.idx];const tot=MCQ_S.mcqs.length;const idx=MCQ_S.idx;
  ct.innerHTML=`<div class="mcq-box"><div class="mcq-qhead"><div class="mcq-score">🎯 ${MCQ_S.score} <span>/ ${idx} answered</span></div><div style="font-size:13px;color:var(--text2)">Q${idx+1} of ${tot}</div></div>

  <div class="mcq-opts" id="mqOpts">${Object.entries(q.options||{}).map(([k,v])=>`<button class="mcq-opt" data-o="${k}" onclick="ansQ(${idx},'${k}')" disabled><span class="lbl">${k}</span><span>${esc(v)}</span></button>`).join('')}</div>
  <div class="mcq-fb" id="mqFB"></div>
  <div style="text-align:center;margin-top:10px;font-size:12px;color:var(--text3)">Click to answer</div></div>`;
  setTimeout(()=>document.querySelectorAll('.mcq-opt').forEach(b=>b.disabled=false),30);

}
function ansQ(idx,choice){
  if(MCQ_S.answered||MCQ_S.complete||idx!==MCQ_S.idx)return;
  const q=MCQ_S.mcqs[idx];const cor=q.correct;const ok=choice===cor;
  document.querySelectorAll('.mcq-opt').forEach(el=>{
    el.disabled=true;const o=el.dataset.o;
    if(o===cor){el.classList.add('show-correct');el.style.borderColor='var(--accent)';el.style.background='rgba(16,185,129,0.08)';el.style.color='#34d399';}
    if(o===choice&&!ok){el.classList.add('wrong');el.style.borderColor='var(--rose)';el.style.background='rgba(244,114,182,0.06)';el.style.color='#f472b6';}
    if(o===choice&&ok){el.classList.add('correct');}
  });
  const fb=document.getElementById('mqFB');
  if(fb){fb.className=`mcq-fb ${ok?'correct':'wrong'}`;fb.innerHTML=ok?`✅ <strong>Correct!</strong> ${esc(q.explanation)}`:`❌ <strong>Incorrect.</strong> Correct: <strong>${cor}</strong> — ${esc(q.explanation)}`;}
  if(ok)MCQ_S.score++;MCQ_S.answered=true;
  const sc=document.querySelector('.mcq-score');if(sc)sc.innerHTML=`🎯 ${MCQ_S.score} <span>/ ${idx+1} answered</span>`;
  if(mcqTOId)clearTimeout(mcqTOId);
  mcqTOId=setTimeout(()=>{mcqTOId=null;MCQ_S.idx++;if(MCQ_S.idx>=MCQ_S.mcqs.length)MCQ_S.complete=true;renderMCQQ();},ok?700:1200);
}
function renderMCQRes(ct){

function inlineAns(qi,chosen,correct,exp,btn){

      ${top.length?`<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px">Most Searched</div>${top.map((d,i)=>`<div onclick="closeStats();doSearch('${esc(d.n)}')" style="display:flex;align-items:center;gap:9px;padding:6px 9px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:3px;cursor:pointer"><span style="font-size:11px;font-weight:700;color:var(--primary-light);min-width:18px">#${i+1}</span><span style="flex:1;font-size:13px;color:var(--text);text-transform:capitalize">${esc(d.n)}</span><span style="font-size:11px;color:var(--text3)">${d.c}×</span><div style="width:50px;height:3px;background:rgba(79,70,229,0.12);border-radius:2px;overflow:hidden"><div style="height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));width:${Math.round(d.c/maxC*100)}%"></div></div></div>`).join('')}`:'<p style="color:var(--text3);font-size:13px;text-align:center;padding:14px">No data yet. Start searching!</p>'}
      <button onclick="if(confirm('Clear all stats?')){localStorage.removeItem('pp_counts');localStorage.removeItem('pp_total');closeStats();}" style="width:100%;margin-top:12px;padding:7px;background:rgba(244,114,182,0.06);border:1px solid rgba(244,114,182,0.15);border-radius:8px;color:#f472b6;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif">🗑 Clear Statistics</button>
    </div>
  </div>`;
}
function closeStats(){document.getElementById('statsContainer').innerHTML='';}

// ─── HISTORY / FAVS ──────────────────────────────────────
function addHistory(name){
  S.history=S.history.filter(h=>h.name.toLowerCase()!==name.toLowerCase());
  S.history.unshift({name,time:Date.now()});
  if(S.history.length>40)S.history=S.history.slice(0,40);
  save('pp_hist',S.history);
}
function trackSearch(name){
  try{const c=JSON.parse(localStorage.getItem('pp_counts')||'{}');c[name.toLowerCase()]=(c[name.toLowerCase()]||0)+1;localStorage.setItem('pp_counts',JSON.stringify(c));localStorage.setItem('pp_total',(parseInt(localStorage.getItem('pp_total')||'0')+1).toString());}catch(e){}
}
function toggleFav(name){
  const idx=S.favs.findIndex(f=>f.name.toLowerCase()===name.toLowerCase());
  if(idx===-1)S.favs.unshift({name,time:Date.now()});
  else S.favs.splice(idx,1);
  save('pp_favs',S.favs);
  document.querySelectorAll('.fav-btn').forEach(b=>{const isnow=isFav(name);b.textContent=isnow?'⭐':'☆';b.classList&&b.classList.toggle('not-fav',!isnow);b.style.transform='scale(1.3)';setTimeout(()=>b.style.transform='',300);});
}

// ─── EXPORT ──────────────────────────────────────────────
function doSpeak(){
  const d=S.currentDrugFull||S.currentDrug;if(!d)return;
  window.speechSynthesis.cancel();
  const txt=`${d.medicine_name}. ${d.drug_class||''}. ${d.overview?.summary||d.overview||''} Key uses: ${(d.therapeutic_uses||d.key_uses||[]).slice(0,3).join(', ')}.`;
  const u=new SpeechSynthesisUtterance(txt);u.rate=0.88;u.lang='en-US';window.speechSynthesis.speak(u);
}
function doCopy(){
  const d=S.currentDrugFull||S.currentDrug;if(!d)return;
  const txt=[d.medicine_name,`Class: ${d.drug_class}`,``,typeof d.overview==='string'?d.overview:(d.overview?.summary||''),``,`Uses: ${(d.therapeutic_uses||d.key_uses||[]).slice(0,4).join(', ')}`,``,`Brands: ${(d.pakistan_brands||d.pakistan_brand_names||d.top_brands||[]).slice(0,3).map(b=>b.brand||b).join(', ')}`,``,`— PharmaPulse by Rabi`].join('\n');
  navigator.clipboard.writeText(txt).then(()=>alert('Copied!')).catch(()=>prompt('Copy:',txt));
}
function doPrint(){window.print();}
function doExportPDF(){
  const d=S.currentDrugFull||S.currentDrug;if(!d)return;
  const date=new Date().toLocaleDateString('en-PK',{day:'numeric',month:'long',year:'numeric'});
  const win=window.open('','_blank');if(!win){alert('Allow popups for PDF export');return;}
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(d.medicine_name)} — PharmaPulse</title><style>body{font-family:Arial,sans-serif;max-width:780px;margin:0 auto;padding:20px;color:#111;font-size:13px}h1{color:#4f46e5;font-size:20px}h2{color:#4f46e5;font-size:14px;border-bottom:1.5px solid #c7d2fe;padding-bottom:3px;margin:14px 0 7px}ul{margin:3px 0;padding-left:16px}li{margin:3px 0}.disc{background:#fef3c7;border:1px solid #f59e0b;padding:7px 11px;border-radius:4px;font-size:11px;margin-top:14px}.footer{text-align:center;font-size:10px;color:#999;margin-top:20px;border-top:1px solid #eee;padding-top:7px}</style></head><body>
  <h1>💊 ${esc(d.medicine_name||'')}</h1><p style="color:#666;font-size:11px">PharmaPulse by Rabi | ${date}</p>
  <p><strong>Class:</strong> ${esc(d.drug_class||'')}</p>
  <h2>Overview</h2><p>${esc(typeof d.overview==='string'?d.overview:(d.overview?.summary||''))}</p>
  <h2>Uses</h2><ul>${(d.therapeutic_uses||d.key_uses||[]).map(u=>`<li>${esc(u)}</li>`).join('')}</ul>
  <h2>Mechanism</h2><p>${esc(d.mechanism_of_action||d.mechanism||'')}</p>
  <h2>Adult Dosing</h2><ul>${(d.adult_dosing||[]).map(dd=>`<li>${esc(dd)}</li>`).join('')}</ul>
  <div class="disc">⚠ ${esc(d.disclaimer||d.safety_disclaimer||'Educational use only.')}</div>
  <div class="footer">PharmaPulse by Rabi — Pakistan Drug Intelligence</div></body></html>`);
  win.document.close();setTimeout(()=>{try{win.print();}catch(e){}},600);
}

// ─── UTILS ───────────────────────────────────────────────
function renderError(msg,q){
  document.getElementById('main').innerHTML=`<div class="err-box"><div style="font-size:30px;margin-bottom:8px">⚠️</div><div style="font-size:15px;font-weight:700;color:#f472b6;margin-bottom:6px">Search Failed</div><div style="font-size:13px;color:var(--text3);margin-bottom:14px">${esc(msg)}</div><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button onclick="doSearch('${esc(q)}')" style="padding:7px 18px;background:rgba(79,70,229,0.08);border:1px solid rgba(79,70,229,0.2);border-radius:8px;color:var(--primary-light);cursor:pointer;font-family:'Inter',sans-serif;font-size:13px">↺ Retry</button><button onclick="goHome()" style="padding:7px 18px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;font-size:13px">← Home</button></div></div>`;
}
function safeJ(raw,fallback){
  let t=raw.trim().replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
  const s=t.indexOf('{'),e=t.lastIndexOf('}');if(s!==-1&&e>s)t=t.slice(s,e+1);
  try{return JSON.parse(t);}catch(e1){try{return JSON.parse(t.replace(/,(\s*[}\]])/g,'$1').replace(/([{,]\s*)(\w+)(\s*:)/g,'$1"$2"$3'));}catch(e2){return{medicine_name:fallback||'Unknown',drug_class:'',overview:'Information could not be parsed. Please try again.',key_uses:[],top_brands:[]};}}
}
function parseJ(raw){
  let t=raw.trim().replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
  const s=t.indexOf('{'),e=t.lastIndexOf('}');if(s!==-1&&e>s)t=t.slice(s,e+1);
  return JSON.parse(t);
}
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');}
function hl(name,q){const i=name.toLowerCase().indexOf(q.toLowerCase());if(i===-1)return esc(name);return esc(name.slice(0,i))+'<strong style="color:var(--primary-light)">'+esc(name.slice(i,i+q.length))+'</strong>'+esc(name.slice(i+q.length));}
function ago(ts){const d=Date.now()-ts;if(d<60000)return'just now';if(d<3600000)return Math.floor(d/60000)+'m ago';if(d<86400000)return Math.floor(d/3600000)+'h ago';return new Date(ts).toLocaleDateString('en-PK',{month:'short',day:'numeric'});}
</script>
