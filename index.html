<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>PharmaPulse — Pakistan Drug Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* ─── Reset & Variables ─────────────────────────── */
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --primary: #4f46e5; --primary-light: #818cf8; --primary-dark: #4338ca;
            --secondary: #f59e0b; --accent: #10b981; --purple-deep: #7c3aed; --rose: #f472b6;
            --bg: #0b0f1a; --bg2: #131b2e; --bg3: #1a2642; --bg4: #22305a;
            --text: #f0f4ff; --text2: #b4c8e8; --text3: #6a80a8;
            --border: rgba(79,70,229,0.15); --border2: rgba(79,70,229,0.30);
            --card: rgba(19,27,46,0.92); --shadow: 0 12px 48px rgba(0,0,0,0.5);
            --glow: 0 0 30px rgba(79,70,229,0.15); --radius: 16px; --radius-sm: 10px;
            --nav-height: 64px;
        }
        :root.light-mode {
            --bg: #f3f6fc; --bg2: #ffffff; --bg3: #eef2f9; --bg4: #e0e8f5;
            --text: #0f172a; --text2: #334155; --text3: #64748b;
            --border: rgba(79,70,229,0.10); --border2: rgba(79,70,229,0.20);
            --card: rgba(255,255,255,0.95); --shadow: 0 8px 30px rgba(79,70,229,0.08);
            --glow: 0 0 24px rgba(79,70,229,0.06);
        }
        html, body { height:100%; font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; transition:background 0.3s; -webkit-tap-highlight-color:transparent; }
        ::-webkit-scrollbar { width:4px; height:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(79,70,229,0.25); border-radius:4px; }

        /* ─── App Layout ──────────────────────────────── */
        .app { display:flex; flex-direction:column; height:100vh; overflow:hidden; }

        /* ─── Top Nav (Fixed) ─────────────────────────── */
        .top-nav {
            display:flex; align-items:center; height:var(--nav-height); padding:0 12px;
            background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0;
            gap:8px; position:relative; z-index:100; backdrop-filter:blur(12px);
            flex-wrap:nowrap;
        }
        .nav-logo { display:flex; align-items:center; gap:6px; flex-shrink:0; cursor:pointer; text-decoration:none; }
        .nav-logo-icon { width:32px; height:32px; background:linear-gradient(135deg,var(--primary),var(--purple-deep)); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:#fff; font-family:'Plus Jakarta Sans',sans-serif; box-shadow:0 4px 8px rgba(79,70,229,0.3); }
        .nav-logo-text { font-family:'Plus Jakarta Sans',sans-serif; font-size:13px; font-weight:700; color:var(--text); letter-spacing:-0.2px; }
        .nav-logo-text span { color:var(--secondary); }
        .nav-logo-sub { font-size:7px; font-weight:500; color:var(--text3); letter-spacing:0.3px; text-transform:uppercase; margin-top:-2px; }

        .nav-spacer { flex:1; min-width:4px; }

        .nav-search-wrap { flex:1; max-width:460px; position:relative; min-width:80px; }
        .nav-search { width:100%; padding:6px 10px 6px 28px; background:var(--bg3); border:1.5px solid var(--border); border-radius:8px; color:var(--text); font-size:12px; font-family:'Inter',sans-serif; outline:none; transition:all 0.3s; }
        .nav-search:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(79,70,229,0.12); }
        .nav-search::placeholder { color:var(--text3); font-size:11px; }
        .nav-search-icon { position:absolute; left:8px; top:50%; transform:translateY(-50%); color:var(--text3); font-size:12px; pointer-events:none; }
        .nav-search-go { position:absolute; right:3px; top:50%; transform:translateY(-50%); padding:2px 10px; background:linear-gradient(135deg,var(--primary),var(--purple-deep)); border:none; border-radius:5px; color:#fff; font-size:10px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.2s; }
        .nav-search-go:hover { transform:translateY(-50%) scale(1.04); box-shadow:0 4px 10px rgba(79,70,229,0.25); }

        .nav-sugg-drop {
            position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--bg2);
            border:1px solid var(--border2); border-radius:var(--radius-sm); box-shadow:var(--shadow);
            z-index:300; overflow:hidden; max-height:200px; overflow-y:auto; display:none;
        }
        .nav-sugg-item { display:flex; align-items:center; gap:6px; padding:6px 10px; cursor:pointer; font-size:12px; color:var(--text); transition:background 0.12s; border-bottom:1px solid var(--border); }
        .nav-sugg-item:last-child { border:none; }
        .nav-sugg-item:hover, .nav-sugg-item.sel { background:rgba(79,70,229,0.07); }
        .nav-sugg-cls { font-size:9px; color:var(--text3); margin-left:auto; white-space:nowrap; background:var(--bg3); padding:1px 6px; border-radius:8px; }

        .nav-actions { display:flex; align-items:center; gap:2px; flex-shrink:0; }
        .nav-btn {
            width:32px; height:32px; background:transparent; border:1px solid var(--border);
            border-radius:7px; color:var(--text2); cursor:pointer; display:flex; align-items:center;
            justify-content:center; font-size:13px; transition:all 0.2s; position:relative;
            flex-shrink:0;
        }
        .nav-btn:hover { border-color:var(--primary-light); color:var(--primary-light); background:rgba(79,70,229,0.05); }
        .nav-btn .badge {
            position:absolute; top:-3px; right:-3px; background:var(--secondary); color:#000;
            border-radius:50%; width:14px; height:14px; font-size:7px; font-weight:700;
            display:flex; align-items:center; justify-content:center; font-family:'Inter',sans-serif;
        }
        .nav-btn.mcq-btn { border-color:rgba(16,185,129,0.3); color:var(--accent); }
        .nav-btn.mcq-btn:hover { border-color:var(--accent); background:rgba(16,185,129,0.08); }
        .nav-btn.pill-btn { border-color:rgba(245,158,11,0.3); color:var(--secondary); }
        .nav-btn.pill-btn:hover { border-color:var(--secondary); background:rgba(245,158,11,0.08); }

        .nav-mode-group {
            display:flex; gap:1px; background:var(--bg3); border:1px solid var(--border);
            border-radius:6px; padding:2px; margin-left:2px;
        }
        .nav-mode-btn { padding:2px 8px; border-radius:4px; border:none; font-size:9px; font-weight:600; cursor:pointer; transition:all 0.2s; background:none; color:var(--text3); font-family:'Inter',sans-serif; }
        .nav-mode-btn.active { background:linear-gradient(135deg,var(--primary),var(--purple-deep)); color:#fff; box-shadow:0 2px 6px rgba(79,70,229,0.2); }
        .nav-mode-btn.theme-btn { font-size:12px; padding:2px 5px; }

        /* ─── Main Content ────────────────────────────── */
        .main-content {
            flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch;
            padding:0 0 20px 0;
        }

        /* ─── Hero ────────────────────────────────────── */
        .hero {
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            min-height:calc(100vh - var(--nav-height)); padding:24px 12px 40px; position:relative;
            text-align:center;
        }
        .hero-bg-shapes { position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
        .hero-bg-shapes .shape { position:absolute; border-radius:50%; opacity:0.06; filter:blur(60px); }
        .hero-bg-shapes .shape:nth-child(1) { width:350px; height:350px; background:var(--primary); top:-80px; right:-60px; }
        .hero-bg-shapes .shape:nth-child(2) { width:250px; height:250px; background:var(--secondary); bottom:-50px; left:-50px; }
        .hero-content { position:relative; z-index:1; max-width:560px; width:100%; }
        .hero-badge { display:inline-block; padding:2px 12px; background:rgba(79,70,229,0.10); border:1px solid rgba(79,70,229,0.20); border-radius:14px; font-size:10px; font-weight:600; color:var(--primary-light); letter-spacing:0.3px; text-transform:uppercase; margin-bottom:10px; }
        .hero-title { font-family:'Plus Jakarta Sans',sans-serif; font-size:34px; font-weight:800; line-height:1.1; background:linear-gradient(135deg,var(--text) 0%,var(--primary-light) 40%,var(--secondary) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:4px; }
        .hero-sub { font-size:15px; color:var(--text2); margin-bottom:4px; font-weight:400; }
        .hero-tag { font-size:12px; color:var(--text3); margin-bottom:16px; }

        .hero-stats { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:2px 0 16px; }
        .hero-stat { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:6px 14px; min-width:60px; text-align:center; backdrop-filter:blur(8px); transition:all 0.2s; }
        .hero-stat:hover { border-color:var(--primary-light); transform:translateY(-2px); box-shadow:var(--glow); }
        .hero-stat .num { font-family:'Plus Jakarta Sans',sans-serif; font-size:18px; font-weight:700; color:var(--primary-light); }
        .hero-stat .lbl { font-size:8px; color:var(--text3); text-transform:uppercase; letter-spacing:0.4px; margin-top:1px; }

        .hero-chips { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin-top:10px; }
        .hero-chip { padding:3px 10px; background:var(--card); border:1px solid var(--border); border-radius:14px; font-size:11px; color:var(--text2); cursor:pointer; transition:all 0.2s; font-weight:500; }
        .hero-chip:hover { border-color:var(--primary-light); color:var(--primary-light); background:rgba(79,70,229,0.05); transform:translateY(-1px); }

        .hero-disclaimer { max-width:480px; margin-top:14px; padding:6px 12px; background:rgba(245,158,11,0.05); border:1px solid rgba(245,158,11,0.12); border-radius:6px; font-size:10px; color:rgba(245,158,11,0.7); line-height:1.5; text-align:center; }

        /* ─── Drug Page ────────────────────────────────── */
        .drug-hero {
            background:linear-gradient(135deg,var(--bg3),var(--bg4));
            border-bottom:1px solid var(--border); padding:16px 16px; position:relative;
        }
        .drug-hero-inner { max-width:920px; margin:0 auto; position:relative; z-index:1; }
        .drug-row { display:flex; align-items:flex-start; gap:16px; flex-wrap:wrap; }
        .drug-struct {
            width:100px; height:100px; flex-shrink:0; background:var(--card);
            border:2px solid var(--border2); border-radius:var(--radius);
            display:flex; align-items:center; justify-content:center; padding:6px;
            cursor:pointer; transition:all 0.3s; position:relative; overflow:hidden;
        }
        .drug-struct:hover { border-color:var(--primary-light); transform:scale(1.03); box-shadow:var(--glow); }
        .drug-struct svg { width:100%; height:100%; }
        .drug-struct .zoom-hint { position:absolute; bottom:3px; right:3px; font-size:7px; background:rgba(0,0,0,0.5); color:#fff; padding:1px 5px; border-radius:2px; opacity:0; transition:opacity 0.2s; }
        .drug-struct:hover .zoom-hint { opacity:1; }

        .drug-info { flex:1; min-width:0; }
        .drug-name { font-family:'Plus Jakarta Sans',sans-serif; font-size:28px; font-weight:800; color:var(--text); line-height:1.15; margin-bottom:2px; letter-spacing:-0.3px; }
        .drug-alias { font-size:13px; color:var(--primary-light); margin-bottom:2px; }
        .drug-class { display:inline-block; padding:2px 10px; background:rgba(79,70,229,0.10); border:1px solid rgba(79,70,229,0.15); border-radius:12px; font-size:11px; font-weight:600; color:var(--primary-light); margin-bottom:6px; }
        .drug-tags { display:flex; flex-wrap:wrap; gap:3px; }
        .drug-tag { padding:1px 8px; border-radius:10px; font-size:9px; font-weight:600; }
        .tag-indigo { background:rgba(79,70,229,0.12); color:var(--primary-light); border:1px solid rgba(79,70,229,0.15); }
        .tag-amber { background:rgba(245,158,11,0.12); color:#fbbf24; border:1px solid rgba(245,158,11,0.15); }
        .tag-emerald { background:rgba(16,185,129,0.12); color:#34d399; border:1px solid rgba(16,185,129,0.15); }
        .tag-rose { background:rgba(244,114,182,0.12); color:#f472b6; border:1px solid rgba(244,114,182,0.15); }

        .drug-actions {
            display:flex; flex-wrap:wrap; gap:3px; margin-top:10px; padding-top:8px;
            border-top:1px solid var(--border);
        }
        .drug-act {
            padding:4px 10px; background:rgba(255,255,255,0.03); border:1px solid var(--border);
            border-radius:6px; color:var(--text2); font-size:10px; cursor:pointer;
            display:flex; align-items:center; gap:3px; transition:all 0.2s;
            font-family:'Inter',sans-serif; font-weight:500;
        }
        .drug-act:hover { border-color:var(--primary-light); color:var(--primary-light); background:rgba(79,70,229,0.05); }
        .drug-act.primary-act { background:linear-gradient(135deg,var(--primary),var(--purple-deep)); border-color:transparent; color:#fff; }
        .drug-act.primary-act:hover { transform:translateY(-1px); box-shadow:0 4px 10px rgba(79,70,229,0.25); color:#fff; }
        .drug-act.fav-act { font-size:14px; padding:4px 7px; }
        .drug-act.fav-act.not-fav { filter:grayscale(1) opacity:0.4; }
        .drug-act.fav-act:not(.not-fav) { color:var(--secondary); }

        /* ─── Drug Tabs ────────────────────────────────── */
        .drug-tabs {
            display:flex; gap:1px; overflow-x:auto; padding:0 12px;
            background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0;
            -webkit-overflow-scrolling:touch; scrollbar-width:none;
        }
        .drug-tabs::-webkit-scrollbar { display:none; }
        .drug-tab {
            padding:8px 12px; font-size:10px; font-weight:600; color:var(--text3);
            cursor:pointer; white-space:nowrap; border-bottom:2.5px solid transparent;
            transition:all 0.2s; font-family:'Inter',sans-serif; letter-spacing:0.2px;
            text-transform:uppercase;
        }
        .drug-tab:hover { color:var(--text2); }
        .drug-tab.active { color:var(--primary-light); border-bottom-color:var(--primary); }

        .drug-sections { max-width:920px; margin:0 auto; padding:16px 16px 30px; }
        .drug-section { display:none; animation:fadeSlide 0.3s ease; }
        .drug-section.active { display:block; }
        @keyframes fadeSlide { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        .sec-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:12px; box-shadow:var(--glow); transition:border-color 0.2s; }
        .sec-card:hover { border-color:rgba(79,70,229,0.15); }
        .sec-head { display:flex; align-items:center; gap:8px; padding:10px 14px; border-bottom:1px solid var(--border); background:rgba(79,70,229,0.02); }
        .sec-head .emoji { font-size:16px; }
        .sec-head .title { font-size:13px; font-weight:700; color:var(--text); flex:1; }
        .sec-head .accent-line { width:3px; height:20px; border-radius:2px; flex-shrink:0; }
        .sec-body { padding:10px 14px; }
        .sec-body p { font-size:13px; color:var(--text2); line-height:1.7; }
        .sec-body ul { list-style:none; padding:0; }
        .sec-body li { padding:4px 0; font-size:13px; color:var(--text2); display:flex; gap:8px; align-items:flex-start; border-bottom:1px solid rgba(255,255,255,0.03); }
        .sec-body li:last-child { border:none; }
        .sec-body li .dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; margin-top:6px; }

        .sub-label { font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.6px; margin:10px 0 4px; }
        .sub-label:first-child { margin-top:0; }

        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .grid-item { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; }
        .grid-item .label { font-size:9px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:3px; }
        .grid-item .value { font-size:12px; color:var(--text2); line-height:1.5; }

        .brand-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; }
        .brand-card { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; transition:all 0.2s; }
        .brand-card:hover { border-color:var(--primary-light); background:rgba(79,70,229,0.04); }
        .brand-card .bname { font-size:13px; font-weight:700; color:var(--primary-light); margin-bottom:1px; }
        .brand-card .bstr { font-size:12px; color:var(--text2); }
        .brand-card .bco { font-size:10px; color:var(--text3); }
        .brand-card .btags { display:flex; flex-wrap:wrap; gap:3px; margin-top:4px; }
        .brand-card .btag { padding:1px 6px; background:rgba(79,70,229,0.08); border:1px solid rgba(79,70,229,0.12); border-radius:6px; font-size:9px; color:var(--primary-light); font-weight:500; }

        .int-row { display:flex; gap:8px; align-items:flex-start; padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.03); }
        .int-row:last-child { border:none; }
        .int-badge { padding:1px 8px; border-radius:6px; font-size:9px; font-weight:700; flex-shrink:0; margin-top:2px; }
        .int-major { background:rgba(244,114,182,0.12); color:#f472b6; border:1px solid rgba(244,114,182,0.2); }
        .int-mod { background:rgba(245,158,11,0.12); color:#fbbf24; border:1px solid rgba(245,158,11,0.2); }
        .int-txt { font-size:13px; color:var(--text2); }

        .faq-item { border-bottom:1px solid var(--border); padding:10px 0; }
        .faq-item:first-child { padding-top:0; }
        .faq-item:last-child { border:none; padding-bottom:0; }
        .faq-q { font-size:13px; font-weight:600; color:var(--text); cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:10px; }
        .faq-q .arrow { color:var(--primary-light); font-size:12px; transition:transform 0.25s; flex-shrink:0; }
        .faq-q .arrow.open { transform:rotate(180deg); }
        .faq-a { font-size:13px; color:var(--text2); line-height:1.6; padding-top:6px; display:none; }
        .faq-a.open { display:block; }

        .ref-item { display:flex; gap:8px; padding:6px 10px; margin:3px 0; background:rgba(79,70,229,0.04); border-left:3px solid var(--primary-light); border-radius:6px; font-size:12px; color:var(--text3); transition:all 0.2s; align-items:center; }
        .ref-item:hover { background:rgba(79,70,229,0.07); }
        .ref-item .num { color:var(--primary-light); font-weight:700; flex-shrink:0; min-width:18px; font-size:10px; }
        .ref-item a { color:var(--primary-light); text-decoration:none; font-weight:500; border-bottom:1.5px solid rgba(79,70,229,0.2); transition:all 0.2s; }
        .ref-item a:hover { border-bottom-color:var(--primary-light); color:var(--secondary); }

        .disclaimer-box { background:rgba(245,158,11,0.05); border:1px solid rgba(245,158,11,0.15); border-radius:var(--radius-sm); padding:10px 12px; margin-top:8px; }
        .disclaimer-box p { font-size:11px; color:rgba(245,158,11,0.7); line-height:1.6; }

        /* ─── Structure Viewer ──────────────────────────── */
        .structure-viewer {
            display:flex; flex-direction:column; align-items:center; gap:12px;
            padding:10px 0;
        }
        .structure-viewer .toggle-group {
            display:flex; gap:10px; background:var(--bg3); padding:4px; border-radius:8px;
            border:1px solid var(--border);
        }
        .structure-viewer .toggle-btn {
            padding:4px 16px; border:none; border-radius:6px; font-size:12px; font-weight:600;
            cursor:pointer; transition:all 0.2s; background:transparent; color:var(--text3);
            font-family:'Inter',sans-serif;
        }
        .structure-viewer .toggle-btn.active {
            background:linear-gradient(135deg,var(--primary),var(--purple-deep));
            color:#fff; box-shadow:0 2px 8px rgba(79,70,229,0.2);
        }
        .structure-viewer .toggle-btn:hover:not(.active) {
            color:var(--text); background:rgba(79,70,229,0.05);
        }
        .structure-viewer .img-container {
            width:100%; min-height:200px; display:flex; justify-content:center; align-items:center;
            background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius-sm);
            overflow:hidden; position:relative;
        }
        .structure-viewer .img-container img {
            max-width:100%; max-height:350px; display:none; object-fit:contain;
        }
        .structure-viewer .img-container .placeholder {
            color:var(--text3); font-size:13px; text-align:center; padding:20px;
        }
        .structure-viewer .img-container .spinner {
            width:30px; height:30px; border:3px solid var(--border); border-top-color:var(--primary-light);
            border-radius:50%; animation:spin 0.7s linear infinite; display:none;
        }
        .structure-viewer .img-container .fallback-svg {
            width:100%; max-height:200px; padding:10px;
        }

        /* ─── MCQ Mode ─────────────────────────────────── */
        .mcq-container { max-width:760px; margin:0 auto; padding:20px 16px 30px; }
        .mcq-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
        .mcq-header .back { padding:4px 12px; background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text2); cursor:pointer; font-size:12px; display:flex; align-items:center; gap:4px; transition:all 0.2s; font-family:'Inter',sans-serif; font-weight:500; }
        .mcq-header .back:hover { border-color:var(--primary-light); color:var(--primary-light); }
        .mcq-header .title { font-family:'Plus Jakarta Sans',sans-serif; font-size:20px; font-weight:800; background:linear-gradient(135deg,var(--primary-light),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .mcq-header .badge { font-size:10px; color:var(--text3); background:var(--bg3); border:1px solid var(--border); border-radius:14px; padding:2px 12px; margin-left:auto; }

        .mcq-search-box { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; margin-bottom:16px; box-shadow:var(--glow); }
        .mcq-search-box label { font-size:12px; font-weight:600; color:var(--text2); display:block; margin-bottom:6px; }
        .mcq-search-row { display:flex; gap:8px; flex-wrap:wrap; position:relative; }
        .mcq-search-row .wrap { flex:1; min-width:140px; position:relative; }
        .mcq-search-row input { width:100%; padding:8px 12px; background:var(--bg3); border:1.5px solid var(--border2); border-radius:8px; color:var(--text); font-size:13px; font-family:'Inter',sans-serif; outline:none; transition:all 0.3s; }
        .mcq-search-row input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(79,70,229,0.08); }
        .mcq-search-row input::placeholder { color:var(--text3); font-size:12px; }

        .mcq-count-group { display:flex; gap:3px; align-items:center; flex-wrap:wrap; margin-top:10px; }
        .mcq-count-group .label { font-size:10px; color:var(--text3); font-weight:600; margin-right:3px; }
        .mcq-count-btn { padding:3px 10px; border-radius:5px; border:1px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; font-size:11px; font-weight:600; font-family:'Inter',sans-serif; transition:all 0.2s; }
        .mcq-count-btn:hover { border-color:var(--primary-light); color:var(--primary-light); }
        .mcq-count-btn.active { background:linear-gradient(135deg,var(--primary),var(--purple-deep)); border-color:transparent; color:#fff; }

        .mcq-generate { padding:8px 20px; background:linear-gradient(135deg,var(--primary),var(--purple-deep)); border:none; border-radius:8px; color:#fff; font-size:13px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.2s; width:100%; margin-top:10px; }
        .mcq-generate:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(79,70,229,0.25); }
        .mcq-generate:disabled { opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; }

        .mcq-quiz { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; box-shadow:var(--glow); animation:fadeSlide 0.3s ease; }
        .mcq-quiz .qhead { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px; padding-bottom:10px; border-bottom:1px solid var(--border); margin-bottom:14px; }
        .mcq-quiz .qhead .score { font-size:16px; font-weight:700; color:var(--primary-light); }
        .mcq-quiz .qhead .score span { color:var(--text2); font-weight:400; font-size:12px; }
        .mcq-quiz .qhead .progress { font-size:12px; color:var(--text2); }
        .mcq-quiz .qtext { font-size:16px; font-weight:600; color:var(--text); line-height:1.5; margin-bottom:14px; }
        .mcq-quiz .opts { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
        .mcq-quiz .opt {
            padding:10px 12px; background:var(--bg3); border:2px solid var(--border);
            border-radius:8px; color:var(--text2); cursor:pointer; font-size:13px;
            font-family:'Inter',sans-serif; font-weight:500; text-align:left;
            display:flex; align-items:center; gap:8px; transition:all 0.2s; min-height:40px;
        }
        .mcq-quiz .opt:hover:not(:disabled) { border-color:var(--primary-light); background:rgba(79,70,229,0.04); color:var(--text); }
        .mcq-quiz .opt .lbl { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:50%; background:rgba(79,70,229,0.08); color:var(--primary-light); font-weight:700; font-size:11px; flex-shrink:0; }
        .mcq-quiz .opt:disabled { cursor:not-allowed; }
        .mcq-quiz .opt.correct { border-color:var(--accent); background:rgba(16,185,129,0.08); color:#34d399; }
        .mcq-quiz .opt.correct .lbl { background:rgba(16,185,129,0.15); color:#34d399; }
        .mcq-quiz .opt.wrong { border-color:var(--rose); background:rgba(244,114,182,0.06); color:#f472b6; }
        .mcq-quiz .opt.wrong .lbl { background:rgba(244,114,182,0.12); color:#f472b6; }
        .mcq-quiz .opt.show-correct { border-color:var(--accent); background:rgba(16,185,129,0.05); color:#34d399; }
        .mcq-quiz .opt.show-correct .lbl { background:rgba(16,185,129,0.10); color:#34d399; }
        .mcq-quiz .fb { margin-top:12px; padding:10px 14px; border-radius:8px; font-size:13px; line-height:1.5; display:none; }
        .mcq-quiz .fb.correct { display:block; background:rgba(16,185,129,0.06); border:1px solid rgba(16,185,129,0.15); color:#34d399; }
        .mcq-quiz .fb.wrong { display:block; background:rgba(244,114,182,0.06); border:1px solid rgba(244,114,182,0.15); color:#f472b6; }
        .mcq-quiz .fb .explain { color:var(--text2); margin-top:2px; }
        .mcq-quiz .hint { text-align:center; margin-top:10px; font-size:11px; color:var(--text3); opacity:0.6; letter-spacing:0.2px; }

        .mcq-results { text-align:center; padding:24px 10px; }
        .mcq-results .big { font-family:'Plus Jakarta Sans',sans-serif; font-size:48px; font-weight:800; background:linear-gradient(135deg,var(--primary-light),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .mcq-results .sub { font-size:14px; color:var(--text2); margin-top:2px; }
        .mcq-results .msg { font-size:17px; font-weight:600; color:var(--text); margin-top:6px; }
        .mcq-results .actions { display:flex; gap:8px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
        .mcq-results .actions button { padding:6px 18px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; font-size:12px; font-weight:600; font-family:'Inter',sans-serif; transition:all 0.2s; }
        .mcq-results .actions button:hover { border-color:var(--primary-light); color:var(--primary-light); }
        .mcq-results .actions .primary { background:linear-gradient(135deg,var(--primary),var(--purple-deep)); border-color:transparent; color:#fff; }
        .mcq-results .actions .primary:hover { transform:scale(1.03); box-shadow:0 4px 16px rgba(79,70,229,0.25); color:#fff; }

        .mcq-loading { text-align:center; padding:30px 16px; }
        .mcq-loading .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--primary-light); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 12px; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ─── Pill Finder ──────────────────────────────── */
        .pill-finder { max-width:720px; margin:30px auto; padding:0 16px; }
        .pill-finder .header { display:flex; align-items:center; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
        .pill-finder .header .icon { font-size:24px; }
        .pill-finder .header .title { font-family:'Plus Jakarta Sans',sans-serif; font-size:22px; font-weight:800; color:var(--primary-light); }
        .pill-finder .header .badge { font-size:10px; color:var(--text3); background:var(--bg3); padding:2px 12px; border-radius:14px; border:1px solid var(--border); }
        .pill-finder .box { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; box-shadow:var(--glow); }
        .pill-finder .box p { color:var(--text2); font-size:13px; margin-bottom:12px; }
        .pill-finder .search-row { display:flex; gap:8px; flex-wrap:wrap; }
        .pill-finder .search-row input { flex:1; min-width:160px; padding:10px 14px; background:var(--bg3); border:1.5px solid var(--border2); border-radius:8px; color:var(--text); font-size:14px; font-family:'Inter',sans-serif; outline:none; transition:all 0.3s; }
        .pill-finder .search-row input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(79,70,229,0.08); }
        .pill-finder .search-row button { padding:10px 24px; background:linear-gradient(135deg,var(--primary),var(--purple-deep)); border:none; border-radius:8px; color:#fff; font-weight:700; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.2s; box-shadow:0 4px 10px rgba(79,70,229,0.25); }
        .pill-finder .search-row button:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(79,70,229,0.35); }
        .pill-finder .examples { display:flex; flex-wrap:wrap; gap:4px; margin-top:10px; }
        .pill-finder .examples .chip { font-size:10px; padding:2px 8px; background:var(--bg3); border:1px solid var(--border); border-radius:12px; color:var(--text3); cursor:pointer; transition:all 0.2s; }
        .pill-finder .examples .chip:hover { border-color:var(--primary-light); color:var(--primary-light); }

        /* ─── Drawer ────────────────────────────────────── */
        .drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:250; opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
        .drawer-overlay.open { opacity:1; pointer-events:auto; }
        .drawer { position:fixed; top:0; right:0; bottom:0; width:280px; max-width:80vw; background:var(--bg2); border-left:1px solid var(--border); z-index:260; transform:translateX(100%); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); display:flex; flex-direction:column; box-shadow:-8px 0 30px rgba(0,0,0,0.3); }
        .drawer.open { transform:translateX(0); }
        .drawer-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
        .drawer-title { font-family:'Plus Jakarta Sans',sans-serif; font-size:16px; font-weight:700; color:var(--text); }
        .drawer-close { width:30px; height:30px; border:1px solid var(--border); border-radius:6px; background:none; color:var(--text3); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
        .drawer-close:hover { border-color:var(--rose); color:var(--rose); }
        .drawer-body { flex:1; overflow-y:auto; padding:12px 14px; }
        .drawer-section-label { font-size:9px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.8px; margin:12px 0 6px; }
        .drawer-section-label:first-child { margin-top:0; }
        .drawer-item { display:flex; align-items:center; gap:8px; padding:6px 10px; border-radius:8px; cursor:pointer; transition:all 0.15s; border:1px solid transparent; margin-bottom:2px; }
        .drawer-item:hover { background:rgba(79,70,229,0.05); border-color:var(--border); }
        .drawer-item.active { background:rgba(79,70,229,0.08); border-color:rgba(79,70,229,0.2); }
        .drawer-item .ico { font-size:13px; flex-shrink:0; color:var(--primary-light); }
        .drawer-item .info { flex:1; min-width:0; }
        .drawer-item .name { font-size:12px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .drawer-item .meta { font-size:9px; color:var(--text3); }
        .drawer-item .del { width:20px; height:20px; border:none; background:none; color:var(--text3); cursor:pointer; font-size:10px; border-radius:4px; display:flex; align-items:center; justify-content:center; opacity:0; transition:all 0.2s; flex-shrink:0; }
        .drawer-item:hover .del { opacity:1; }
        .drawer-item .del:hover { color:var(--rose); background:rgba(244,114,182,0.08); }
        .drawer-empty { text-align:center; padding:24px 10px; color:var(--text3); }
        .drawer-empty .big { font-size:28px; opacity:0.2; margin-bottom:6px; }
        .drawer-empty p { font-size:11px; line-height:1.5; }

        /* ─── Structure Modal ──────────────────────────── */
        .struct-modal { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:400; display:flex; align-items:center; justify-content:center; padding:16px; backdrop-filter:blur(6px); animation:fadeIn 0.2s ease; }
        .struct-modal .box { background:var(--bg2); border:1px solid var(--border2); border-radius:16px; padding:20px; max-width:420px; width:100%; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.6); }
        .struct-modal .box .close { float:right; background:none; border:1px solid var(--border); border-radius:5px; width:28px; height:28px; cursor:pointer; color:var(--text3); font-size:13px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
        .struct-modal .box .close:hover { border-color:var(--rose); color:var(--rose); }
        .struct-modal .box .sname { font-family:'Plus Jakarta Sans',sans-serif; font-size:18px; font-weight:700; color:var(--primary-light); margin-bottom:2px; }
        .struct-modal .box .sclass { font-size:11px; color:var(--text3); margin-bottom:12px; }
        .struct-modal .box .svg-wrap { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px; display:flex; justify-content:center; margin-bottom:12px; }
        .struct-modal .box .svg-wrap svg { width:160px; height:160px; }
        .struct-modal .box .actions { display:flex; gap:6px; }
        .struct-modal .box .actions button { flex:1; padding:6px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; font-size:11px; font-weight:600; font-family:'Inter',sans-serif; transition:all 0.2s; }
        .struct-modal .box .actions button:hover { border-color:var(--primary-light); color:var(--primary-light); }
        .struct-modal .box .actions .primary { background:linear-gradient(135deg,var(--primary),var(--purple-deep)); border-color:transparent; color:#fff; }
        .struct-modal .box .actions .primary:hover { box-shadow:0 4px 12px rgba(79,70,229,0.25); color:#fff; }

        @keyframes fadeIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }

        /* ─── Responsive ────────────────────────────────── */
        @media(max-width:820px) {
            .drug-row { flex-direction:column; gap:12px; }
            .drug-struct { width:100%; height:100px; max-width:100%; }
            .drug-name { font-size:26px; }
            .grid-2 { grid-template-columns:1fr; }
            .mcq-quiz .opts { grid-template-columns:1fr; }
            .brand-grid { grid-template-columns:1fr 1fr; }
            .hero-title { font-size:30px; }
            .drug-sections { padding:12px 12px 20px; }
            .drug-hero { padding:12px 14px; }
            .top-nav { padding:0 8px; gap:6px; flex-wrap:nowrap; }
            .nav-logo-text { font-size:11px; }
            .nav-logo-sub { display:none; }
            .nav-search-wrap { max-width:220px; min-width:60px; }
            .nav-search { font-size:11px; padding:5px 8px 5px 22px; }
            .nav-search-icon { font-size:10px; left:6px; }
            .nav-search-go { font-size:9px; padding:2px 8px; }
            .nav-btn { width:28px; height:28px; font-size:12px; }
            .nav-mode-btn { font-size:8px; padding:2px 6px; }
            .drawer { width:260px; }
            .hero-stats { gap:6px; }
            .hero-stat { padding:5px 10px; min-width:55px; }
            .hero-stat .num { font-size:16px; }
            .structure-viewer .img-container img { max-height:250px; }
        }
        @media(max-width:480px) {
            .nav-logo-text { font-size:10px; }
            .nav-logo-icon { width:26px; height:26px; font-size:12px; }
            .nav-search-wrap { max-width:120px; min-width:50px; }
            .nav-search { font-size:10px; padding:4px 6px 4px 18px; }
            .nav-search-go { display:none; }
            .nav-mode-group { gap:1px; padding:1px; }
            .nav-mode-btn { font-size:7px; padding:1px 4px; }
            .nav-btn { width:24px; height:24px; font-size:10px; }
            .hero-title { font-size:24px; }
            .hero-sub { font-size:13px; }
            .drug-name { font-size:22px; }
            .drug-actions { gap:3px; }
            .drug-act { font-size:9px; padding:3px 8px; }
            .drug-act span { display:none; }
            .drug-tab { font-size:9px; padding:6px 8px; }
            .brand-grid { grid-template-columns:1fr; }
            .sec-head { padding:8px 12px; }
            .sec-body { padding:8px 12px; }
            .sec-body li { font-size:12px; }
            .sec-body p { font-size:12px; }
            .mcq-container { padding:12px 8px 20px; }
            .mcq-header .title { font-size:17px; }
            .mcq-quiz .qtext { font-size:14px; }
            .mcq-quiz .opt { font-size:12px; padding:8px 10px; min-height:34px; }
            .mcq-quiz { padding:12px; }
            .mcq-search-box { padding:12px; }
            .drawer { width:240px; }
            .hero-stat .num { font-size:14px; }
            .hero-stat { padding:4px 8px; min-width:50px; }
            .hero-stat .lbl { font-size:7px; }
            .pill-finder .search-row input { font-size:12px; padding:8px 10px; }
            .pill-finder .search-row button { font-size:12px; padding:8px 16px; }
            .structure-viewer .img-container img { max-height:180px; }
        }
        @media print {
            .top-nav, .drawer-overlay, .drawer, .drug-actions, .drug-tabs { display:none !important; }
            .app, .main-content { display:block; height:auto; overflow:visible; }
            .drug-hero { background:#f5f5f5 !important; border-bottom:1px solid #ddd; padding:12px; }
            .drug-name { color:#111 !important; -webkit-text-fill-color:#111 !important; }
            .sec-card { border:1px solid #ddd; break-inside:avoid; box-shadow:none !important; }
            .sec-body li, .sec-body p { color:#333 !important; }
        }
    </style>
</head>
<body>

    <div class="app" id="app">

        <!-- ─── TOP NAV (Fixed) ───────────────────────── -->
        <nav class="top-nav" id="topNav">
            <a class="nav-logo" href="#" onclick="newSearch();return false;">
                <div class="nav-logo-icon">⚕</div>
                <div>
                    <div class="nav-logo-text">Pharma<span>Pulse</span></div>
                    <div class="nav-logo-sub">Pakistan Drug Intel</div>
                </div>
            </a>

            <div class="nav-spacer"></div>

            <div class="nav-search-wrap" id="navSearchWrap">
                <span class="nav-search-icon">🔍</span>
                <input class="nav-search" id="navSearch" type="text"
                placeholder="Search drug, brand, class…"
                oninput="onNavInput(this.value)"
                onkeydown="onNavKey(event)"
                autocomplete="off" spellcheck="false" />
                <button class="nav-search-go" onclick="triggerNavSearch()">Go</button>
                <div class="nav-sugg-drop" id="navSuggDrop"></div>
            </div>

            <div class="nav-actions">
                <button class="nav-btn" onclick="openDrawer('history')" title="History">
                    🕐
                    <span class="badge" id="histBadge" style="display:none">0</span>
                </button>
                <button class="nav-btn" onclick="openDrawer('favorites')" title="Favorites">
                    ⭐
                    <span class="badge" id="favBadge" style="display:none">0</span>
                </button>
                <button class="nav-btn" onclick="openStatsModal()" title="Statistics">📊</button>
                <button class="nav-btn" onclick="openCompareModal()" title="Compare">⚖</button>
                <button class="nav-btn mcq-btn" onclick="openMCQMode()" title="MCQ Practice">📝</button>
                <button class="nav-btn pill-btn" onclick="openPillFinder()" title="Pill Finder">💊</button>

                <div class="nav-mode-group">
                    <button class="nav-mode-btn active" id="navModePro" onclick="setMode('professional')">Pro</button>
                    <button class="nav-mode-btn" id="navModeLay" onclick="setMode('layman')">Lay</button>
                    <button class="nav-mode-btn theme-btn" id="navThemeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
                </div>
            </div>
        </nav>

        <!-- ─── MAIN CONTENT ───────────────────────────── -->
        <main class="main-content" id="mainContent"></main>
    </div>

    <!-- ─── DRAWER ────────────────────────────────────── -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
    <aside class="drawer" id="drawer">
        <div class="drawer-header">
            <span class="drawer-title" id="drawerTitle">History</span>
            <button class="drawer-close" onclick="closeDrawer()">✕</button>
        </div>
        <div class="drawer-body" id="drawerBody"></div>
    </aside>

    <!-- ─── STATS MODAL ──────────────────────────────── -->
    <div class="struct-modal" id="statsModal" style="display:none" onclick="if(event.target===this)closeStatsModal()">
        <div class="box">
            <button class="close" onclick="closeStatsModal()">✕</button>
            <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;color:var(--primary-light);margin-bottom:4px;">📊 Usage Statistics</div>
            <div id="statsContent"></div>
        </div>
    </div>

    <!-- ─── COMPARE MODAL ────────────────────────────── -->
    <div class="struct-modal" id="compareModal" style="display:none" onclick="if(event.target===this)closeCompareModal()">
        <div class="box" style="max-width:660px;">
            <button class="close" onclick="closeCompareModal()">✕</button>
            <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;color:var(--primary-light);margin-bottom:2px;">⚖ Drug Comparison</div>
            <div style="font-size:11px;color:var(--text3);margin-bottom:12px;">Compare two medicines side by side</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
                <div style="flex:1;min-width:120px;">

            </div>
            ${S.history.map((h,i) => `
              <div class="drawer-item ${S.currentDrug && (S.currentDrug.medicine_name||'').toLowerCase()===h.name.toLowerCase()?'active':''}" onclick="closeDrawer();openFromHist(${i})">
                <span class="ico">💊</span>
                <div class="info"><div class="name">${esc(h.name)}</div><div class="meta">${timeAgo(h.time)}</div></div>

              </div>`).join('')}
          `;
        }
        function openFromHist(idx) {
            const h = S.history[idx];
            if (h && h.data) { S.currentDrug = h.data;
                S.openFAQs = {};
                renderDrugPage(h.data); } else if (h) { doSearch(h.name); }
            renderDrawerContent();
        }
        function openFavItem(idx) {
            const favs = loadFavorites();
            const f = favs[idx];
            if (f && f.data) { S.currentDrug = f.data;
                S.openFAQs = {};
                renderDrugPage(f.data); } else if (f) { doSearch(f.name); }
        }
        function removeFav(idx) {
            const favs = loadFavorites();
            favs.splice(idx, 1);
            saveFavorites(favs);
            updateBadges();
        }
        function timeAgo(ts) {
            const d = Date.now() - ts;
            if (d < 60000) return 'just now';
            if (d < 3600000) return Math.floor(d / 60000) + 'm ago';
            if (d < 86400000) return Math.floor(d / 3600000) + 'h ago';
            return new Date(ts).toLocaleDateString('en-PK', { month: 'short', day: 'numeric' });
        }

        // ─── LANDING ──────────────────────────────────────
        function renderLanding() {
            MCQ.active = false;
            const c = document.getElementById('mainContent');
            const stats = getUsageStats();
            c.innerHTML = `
          <div class="hero">
            <div class="hero-bg-shapes"><div class="shape"></div><div class="shape"></div></div>
            <div class="hero-content">
              <div class="hero-badge">⚕ Pakistan Drug Intelligence</div>

                <div class="hero-stat"><div class="num">${stats.total}</div><div class="lbl">Searches</div></div>
                <div class="hero-stat"><div class="num">${stats.unique}</div><div class="lbl">Drugs</div></div>
                <div class="hero-stat"><div class="num">${stats.favs}</div><div class="lbl">Favorites</div></div>

              </div>

              </div>

                ⚠ For educational and informational use only. Not a substitute for physician or pharmacist judgment.

            setTimeout(() => { const inp = document.getElementById('navSearch'); if (inp) inp.focus(); }, 100);
