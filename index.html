        function newSearch() {
            S.currentDrug = null;
            S.openFAQs = {};
            MCQ.active = false;
            renderLanding();
            updateBadges();
            closeDrawer();
        }

        // ─── NAV SEARCH ──────────────────────────────────
        let navDebTimer, navSuggIdx = -1;

        function onNavInput(val) {
            S.query = val;
            clearTimeout(navDebTimer);
            if (!val.trim()) { hideNavSugg(); return; }
            navDebTimer = setTimeout(() => showNavSugg(val), 200);
        }

        async function showNavSugg(val) {
            const dd = document.getElementById('navSuggDrop');
            if (!dd) return;
            navSuggIdx = -1;
            dd.style.display = 'block';
            dd.innerHTML = '<div style="padding:8px;color:var(--text3);text-align:center;font-size:11px;">⏳ Searching…</div>';
            try {
                const results = await fetchSuggestions(val);
                if (!results.length) { hideNavSugg(); return; }
                dd.innerHTML = results.map((m, i) =>
                    `<div class="nav-sugg-item" data-i="${i}" onmousedown="doSearch('${m.name.replace(/'/g,"\\'")}')">
                💊 ${highlight(m.name,val)}
                <span class="nav-sugg-cls">${esc(m.cls||'')}</span>
              </div>`
                ).join('');
            } catch (err) {
                dd.innerHTML = '<div style="padding:8px;color:var(--text3);text-align:center;font-size:11px;">⚠ Could not fetch suggestions</div>';
            }
        }
        function hideNavSugg() { const dd = document.getElementById('navSuggDrop'); if (dd) dd.style.display = 'none';
            navSuggIdx = -1; }
        function onNavKey(e) {
            const dd = document.getElementById('navSuggDrop');
            const isOpen = dd && dd.style.display !== 'none';
            if (!isOpen) { if (e.key === 'Enter') triggerNavSearch(); return; }
            const items = dd ? dd.querySelectorAll('.nav-sugg-item') : [];
            if (e.key === 'ArrowDown') { e.preventDefault();
                navSuggIdx = Math.min(navSuggIdx + 1, items.length - 1);
                hlNavSugg(items); } else if (e.key === 'ArrowUp') { e.preventDefault();
                navSuggIdx = Math.max(navSuggIdx - 1, -1);
                hlNavSugg(items); } else if (e.key === 'Enter') { e.preventDefault(); if (navSuggIdx >= 0 && items[navSuggIdx]) items[
                        navSuggIdx].dispatchEvent(new MouseEvent('mousedown'));
                else triggerNavSearch(); } else if (e.key === 'Escape') hideNavSugg();
        }
        function hlNavSugg(items) { items.forEach((it, i) => it.classList.toggle('sel', i === navSuggIdx)); }
        function triggerNavSearch() {
            const inp = document.getElementById('navSearch');
            const q = inp ? inp.value.trim() : S.query.trim();
            if (!q) return;
            hideNavSugg();
            doSearch(q);
        }
        function highlight(name, q) {
            const i = name.toLowerCase().indexOf(q.toLowerCase());
            if (i === -1) return esc(name);
            return esc(name.slice(0, i)) + '<strong style="color:var(--primary-light)">' + esc(name.slice(i, i + q.length)) +
                '</strong>' + esc(name.slice(i + q.length));
        }

        // ─── SUGGESTIONS (via Worker) ──────────────────
        async function fetchSuggestions(query) {
            const q = query.trim().toLowerCase();
            if (!q) return [];
            const localMatches = MEDICINES.filter(m =>
                m.name.toLowerCase().startsWith(q) || m.name.toLowerCase().includes(q)
            ).slice(0, 5);
            if (localMatches.length >= 3) return localMatches;
            const prompt =
                `Suggest up to 6 drugs matching "${q}" common in Pakistan. Return ONLY JSON array: [{"name":"Drug","cls":"Class"}]. Real drugs only.`;
            try {
                const data = await callGroqViaWorker({ messages: [{ role: 'user', content: prompt }], max_tokens: 200,
                    temperature: 0.2 });
                const txt = data.choices?.[0]?.message?.content || '';
                const m = txt.match(/\[[\s\S]*?\]/);
                if (!m) return localMatches;
                const parsed = JSON.parse(m[0]);
                const apiResults = Array.isArray(parsed) ? parsed.slice(0, 6) : [];
                const localNames = localMatches.map(l => l.name.toLowerCase());
                const merged = [...localMatches, ...apiResults.filter(a => !localNames.includes(a.name.toLowerCase()))];
                return merged.slice(0, 7);
            } catch (err) { return localMatches; }
        }

        // ─── MAIN SEARCH ──────────────────────────────────
        async function doSearch(query) {
            if (!query.trim()) return;
            S.lastQuery = query;
            S.openFAQs = {};
            S.selectedMCQ = {};
            S.shownAnswers = {};
            MCQ.active = false;
            renderLoading(query);
            try {
                const data = await fetchDrugInfo(query);
                S.currentDrug = data;
                addToHistory(data.medicine_name || query);
                trackSearch(data.medicine_name || query);
                renderDrugPage(data);
            } catch (err) {
                renderError(err.message || 'Unknown error', query);
            } finally { updateBadges(); }
        }

        function addToHistory(name) {
            S.history = S.history.filter(h => h.name.toLowerCase() !== name.toLowerCase());
            S.history.unshift({ name, time: Date.now(), data: S.currentDrug });
            if (S.history.length > 40) S.history = S.history.slice(0, 40);
            saveHistory();
            updateBadges();
        }

        // ─── FETCH DRUG INFO ────────────────────────────
        async function fetchDrugInfo(query) {
            const modeInstr = S.mode === 'layman' ?
                'Use simple, patient-friendly Urdu/English mixed. Avoid heavy jargon.' :
                'Use proper clinical/pharmacological terminology for professionals.';
            const prompt =
                `You are an expert clinical pharmacologist specializing in medicines in Pakistan.
          ${modeInstr}
          User searches: "${query}"
          Return ONLY valid JSON. No markdown. No backticks.
          {
            "medicine_name": "official generic name",
            "aliases": ["brand1","brand2"],
            "drug_class": "pharmacological class",
            "overview": {
              "summary": "2-3 sentence overview",
              "key_points": ["point1","point2","point3","point4"]
            },
            "therapeutic_uses": ["use1","use2","use3","use4","use5"],
            "adverse_reactions": {
              "common": ["effect1","effect2","effect3"],
              "serious": ["effect1","effect2"],
              "seek_medical_help_when": ["situation1","situation2"]
            },
            "contraindications": {
              "absolute": ["ci1","ci2"],
              "cautions": ["caution1","caution2","caution3"]
            },
            "mechanism_of_action": "clear explanation",
            "pharmacokinetics_pharmacodynamics": {
              "absorption": "details",
              "distribution": "details",
              "metabolism": "details",
              "elimination": "details",
              "half_life": "X hours",
              "pharmacodynamics_notes": "notes"
            },
            "adult_dosing": ["Indication: dose regimen"],
            "pediatric_dosing": ["Age/weight: dose regimen"],
            "drug_interactions": {
              "major": ["Drug X: effect"],
              "moderate": ["Drug A: effect"],
              "administration_notes": ["note1","note2"]
            },
            "pregnancy_lactation": {
              "pregnancy": "FDA category and details",
              "lactation": "details"
            },
            "renal_hepatic_considerations": {
              "renal": "dose adjustment notes",
              "hepatic": "hepatic caution notes"
            },
            "monitoring_parameters": ["param1","param2","param3"],
            "counseling_points": ["point1","point2","point3","point4","point5"],
            "pakistan_brand_names": [
              {"brand":"BrandName","strengths":["250mg","500mg"],"company":"CompanyName","dosage_forms":["tablet","capsule"]}
            ],
            "related_clinical_case": {
              "scenario": "brief realistic case",
              "discussion": "why this drug was chosen",
              "pearls": ["pearl1","pearl2","pearl3"]
            },
            "faq": [
              {"question":"Q1?","answer":"A1"},
              {"question":"Q2?","answer":"A2"},
              {"question":"Q3?","answer":"A3"},
              {"question":"Q4?","answer":"A4"},
              {"question":"Q5?","answer":"A5"},
              {"question":"Q6?","answer":"A6"}
            ],
            "references": ["Ref1","Ref2","Ref3","Ref4","Ref5"],
            "safety_disclaimer": "Educational use only. Verify from authoritative references."
          }
          Include 5-8 realistic Pakistan brands. Use companies like Getz, AGP, Hilton, Abbott, Pfizer, Sanofi, Novartis, GSK, Adamjee, Ferozsons, Highnoon, Searle, Martin Dow.
          Return ONLY the JSON object.`;

            const data = await callGroqViaWorker({ messages: [{ role: 'user', content: prompt }],
                max_tokens: CONFIG.MAX_TOKENS, temperature: 0.2 });
            const raw = data.choices?.[0]?.message?.content || '';
            return safeParseJSON(raw, query);
        }

        function safeParseJSON(raw, query) {
            let txt = raw.trim();
            txt = txt.replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/\s*```$/, '').trim();
            const s = txt.indexOf('{');
            const e = txt.lastIndexOf('}');
            if (s !== -1 && e !== -1 && e > s) txt = txt.slice(s, e + 1);
            try { return JSON.parse(txt); } catch (err) {
                try {
                    const fixed = txt.replace(/,(\s*[}\]])/g, '$1').replace(/([{,]\s*)(\w+)(\s*:)/g, '$1"$2"$3');
                    return JSON.parse(fixed);
                } catch (err2) {
                    return {
                        medicine_name: query,
                        aliases: [],
                        drug_class: 'Information unavailable',
                        overview: { summary: `Information for ${query} could not be parsed.`, key_points: [
                                'Try again', 'Check connection'
                            ] },
                        therapeutic_uses: [],
                        adverse_reactions: { common: [], serious: [], seek_medical_help_when: [] },
                        contraindications: { absolute: [], cautions: [] },
                        mechanism_of_action: 'Unavailable',
                        pharmacokinetics_pharmacodynamics: { absorption: '', distribution: '',
                            metabolism: '', elimination: '', half_life: '', pharmacodynamics_notes: '' },
                        adult_dosing: [],
                        pediatric_dosing: [],
                        drug_interactions: { major: [], moderate: [], administration_notes: [] },
                        pregnancy_lactation: { pregnancy: 'Consult clinician', lactation: 'Consult clinician' },
                        renal_hepatic_considerations: { renal: '', hepatic: '' },
                        monitoring_parameters: [],
                        counseling_points: [],
                        pakistan_brand_names: [],
                        related_clinical_case: { scenario: '', discussion: '', pearls: [] },
                        faq: [],
                        references: [],
                        safety_disclaimer: 'Always verify from authoritative references.'
                    };
                }
            }
        }

        // ─── LOADING / ERROR ────────────────────────────
        function renderLoading(query) {
            document.getElementById('mainContent').innerHTML = `
            <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;padding:30px 20px;gap:12px;">
              <div style="width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary-light);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
              <div style="font-size:15px;font-weight:600;color:var(--text);">Searching: "<strong>${esc(query)}</strong>"</div>
              <div style="font-size:12px;color:var(--text3);">Consulting clinical references &amp; Pakistan formulary…</div>
            </div>`;
        }
        function renderError(msg, query) {
            document.getElementById('mainContent').innerHTML = `
            <div style="max-width:420px;margin:40px auto;background:rgba(244,114,182,0.06);border:1px solid rgba(244,114,182,0.2);border-radius:var(--radius);padding:24px;text-align:center;">
              <div style="font-size:32px;margin-bottom:6px;">⚠️</div>
              <div style="font-size:15px;font-weight:700;color:#f472b6;margin-bottom:4px;">Search Failed</div>
              <div style="font-size:12px;color:var(--text3);margin-bottom:14px;">${esc(msg)}</div>
              <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
                <button onclick="doSearch('${esc(query)}')" style="padding:6px 16px;background:rgba(79,70,229,0.08);border:1px solid rgba(79,70,229,0.2);border-radius:6px;color:var(--primary-light);cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;">↺ Retry</button>
                <button onclick="newSearch()" style="padding:6px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;">← New Search</button>
              </div>
            </div>`;
        }

        // ─── RENDER DRUG PAGE ────────────────────────────
        function renderDrugPage(d) {
            const c = document.getElementById('mainContent');
            c.innerHTML = `
            ${buildDrugHero(d)}
            ${buildDrugTabs()}
            <div class="drug-sections" id="drugSections">
              ${buildOverview(d)}
              ${buildUses(d)}
              ${buildMechanism(d)}
              ${buildPKPD(d)}
              ${buildAdverse(d)}
              ${buildContraindications(d)}
              ${buildAdultDosing(d)}
              ${buildPediatricDosing(d)}
              ${buildInteractions(d)}
              ${buildPakBrands(d)}
              ${buildPregnancy(d)}
              ${buildRenalHepatic(d)}
              ${buildCounseling(d)}
              ${buildMonitoring(d)}
              ${buildClinicalCase(d)}
              ${buildFAQ(d)}
              ${buildStructure(d)}   <!-- New Structure Section -->
              ${buildRefs(d)}
              <div id="mcqCont"></div>
            </div>`;
            const firstTab = document.querySelector('.drug-tab');
            if (firstTab) firstTab.classList.add('active');
            const firstSection = document.querySelector('.drug-section');
            if (firstSection) firstSection.classList.add('active');
            updateBadges();
            closeDrawer();
            document.getElementById('mainContent').scrollTop = 0;
        }

        // ─── STRUCTURE SECTION ───────────────────────────
        function buildStructure(d) {
            const name = d.medicine_name || '';
            // This section will be populated dynamically with JS
            return `<div class="drug-section" id="sec-structure">
            <div class="sec-card">
              <div class="sec-head">
                <div class="accent-line" style="background:#a855f7;"></div>
                <span class="emoji">🧪</span>
                <span class="title">Chemical Structure (2D / 3D)</span>
              </div>
              <div class="sec-body" id="structureBody">
                <div class="structure-viewer" id="structureViewer">
                  <div class="toggle-group">
                    <button class="toggle-btn active" id="struct2D" onclick="switchStructureView('2d')">2D</button>
                    <button class="toggle-btn" id="struct3D" onclick="switchStructureView('3d')">3D</button>
                  </div>
                  <div class="img-container" id="structImgContainer">
                    <div class="placeholder" id="structPlaceholder">Loading structure from PubChem...</div>
                    <div class="spinner" id="structSpinner"></div>
                    <img id="structImage" src="" alt="Chemical Structure" />
                  </div>
                  <div style="font-size:10px;color:var(--text3);margin-top:6px;text-align:center;">
                    Source: PubChem API | <span class="hero-chip" style="font-size:9px;padding:1px 6px;" onclick="viewStructure('${esc(name)}')">View Generic SVG</span>
                  </div>
                </div>
              </div>
            </div>
          </div>`;
        }

        // ─── STRUCTURE VIEWER LOGIC ──────────────────────
        let currentStructView = '2d';
        let structCID = null;

        async function switchStructureView(view) {
            currentStructView = view;
            // Update toggle buttons
            document.getElementById('struct2D').classList.toggle('active', view === '2d');
            document.getElementById('struct3D').classList.toggle('active', view === '3d');
            // Reload image
            const name = S.currentDrug?.medicine_name;
            if (name) {
                await fetchStructureImage(name, view);
            }
        }

        async function fetchStructureImage(drugName, view) {
            const img = document.getElementById('structImage');
            const placeholder = document.getElementById('structPlaceholder');
            const spinner = document.getElementById('structSpinner');
            if (!img || !placeholder || !spinner) return;

            // Show loading
            placeholder.style.display = 'none';
            spinner.style.display = 'block';
            img.style.display = 'none';

            try {
                // First, try to get CID from PubChem
                const cid = await getCID(drugName);
                if (!cid) {
                    // Fallback to using name directly
                    let url = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(drugName)}/PNG`;
                    if (view === '3d') {
                        // For 3D, we can use the same but with a parameter? PubChem doesn't have direct 3D image API.
                        // Use the 3D viewer embed instead? But we want an image. Use CACTVS for 3D? Not reliable.
                        // We'll use the PubChem 3D viewer in an iframe? But we have an img tag.
                        // Better: use the NCBI's 3D structure viewer as an iframe, but we'll keep it simple: show a placeholder.
                        // Actually we can use the PubChem 3D conformer image via a different service.
                        // For now, we show a message that 3D is not available as image, but we can embed the viewer.
                        // I'll implement a fallback: show a message to view 3D via PubChem.
                        placeholder.style.display = 'block';
                        placeholder.textContent = '3D structure not available as image. Click below to view on PubChem.';
                        spinner.style.display = 'none';
                        img.style.display = 'none';
                        // Show a link
                        const link = document.createElement('a');
                        link.href = `https://pubchem.ncbi.nlm.nih.gov/compound/${cid || encodeURIComponent(drugName)}#section=3D-Conformer`;
                        link.target = '_blank';
                        link.textContent = 'View 3D on PubChem ↗';
                        link.style.color = 'var(--primary-light)';
                        link.style.textDecoration = 'underline';
                        placeholder.appendChild(document.createElement('br'));
                        placeholder.appendChild(link);
                        return;
                    }
                    img.src = url;
                    img.onload = function() {
                        spinner.style.display = 'none';
                        img.style.display = 'block';
                        placeholder.style.display = 'none';
                    };
                    img.onerror = function() {
                        spinner.style.display = 'none';
                        placeholder.style.display = 'block';
                        placeholder.textContent = 'Could not load structure from PubChem.';
                    };
                } else {
                    // Use CID for 2D
                    let url = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/PNG`;
                    if (view === '3d') {
                        // 3D: use the same but add parameter? Actually PubChem has a 3D PNG service?
                        // There is a record_type parameter but not sure. We'll use the 3D viewer embed.
                        // For simplicity, we'll show a link to PubChem 3D viewer.
                        placeholder.style.display = 'block';
                        placeholder.textContent = '3D structure available on PubChem. Click below to view.';
                        spinner.style.display = 'none';
                        img.style.display = 'none';
                        const link = document.createElement('a');
                        link.href = `https://pubchem.ncbi.nlm.nih.gov/compound/${cid}#section=3D-Conformer`;
                        link.target = '_blank';
                        link.textContent = 'View 3D on PubChem ↗';
                        link.style.color = 'var(--primary-light)';
                        link.style.textDecoration = 'underline';
                        placeholder.appendChild(document.createElement('br'));
                        placeholder.appendChild(link);
                        return;
                    }
                    img.src = url;
                    img.onload = function() {
                        spinner.style.display = 'none';
                        img.style.display = 'block';
                        placeholder.style.display = 'none';
                    };
                    img.onerror = function() {
                        spinner.style.display = 'none';
                        placeholder.style.display = 'block';
                        placeholder.textContent = 'Could not load structure from PubChem.';
                    };
                }
            } catch (err) {
                spinner.style.display = 'none';
                placeholder.style.display = 'block';
                placeholder.textContent = 'Error fetching structure: ' + err.message;
            }
        }

        async function getCID(drugName) {
            try {
                const response = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(drugName)}/cids/JSON`);
                const data = await response.json();
                const cid = data?.IdentifierList?.CID?.[0];
                return cid || null;
            } catch (e) {
                return null;
            }
        }

        // ─── DRUG HERO ──────────────────────────────────
        function buildDrugHero(d) {
            const name = d.medicine_name || 'Unknown';
            const aliases = (d.aliases || []).slice(0, 4).join(' · ');
            const cls = d.drug_class || '';
            const isAntibiotic = /antibiotic|antibacterial/i.test(cls);
            const isAHT = /arb|ace|antihypertensive|calcium channel|beta.block/i.test(cls);
            const isADM = /antidiabetic|insulin|biguanide|sulfonylurea/i.test(cls);

            function getStructSVG() {
                // Generic fallback SVG that always works
                const hue = Math.abs(name.charCodeAt(0) * 137 + (name.charCodeAt(1) || 0) * 29) % 360;
                const c1 = `hsl(${hue},90%,60%)`;
                return `<rect x="20" y="28" width="70" height="50" rx="24" ry="24" fill="none" stroke="${c1}" stroke-width="2.5" opacity="0.6"/>
                <circle cx="40" cy="53" r="12" fill="none" stroke="${c1}" stroke-width="2" opacity="0.4"/>
                <circle cx="70" cy="53" r="12" fill="none" stroke="${c1}" stroke-width="2" opacity="0.4"/>
                <line x1="52" y1="53" x2="58" y2="53" stroke="${c1}" stroke-width="2.5"/>
                <circle cx="40" cy="53" r="4" fill="${c1}" opacity="0.25"/>
                <circle cx="70" cy="53" r="4" fill="${c1}" opacity="0.25"/>
                <text x="32" y="92" font-size="8" fill="var(--text3)" opacity="0.6">💊 ${esc(name.split(' ')[0])}</text>`;
            }

            return `<div class="drug-hero">
            <div class="drug-hero-inner">
              <div class="drug-row">
                <div class="drug-struct" onclick="viewStructure('${esc(name)}')" title="Click to view structure">
                  <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">${getStructSVG()}</svg>
                  <span class="zoom-hint">🔍</span>
                </div>
                <div class="drug-info">
                  <div class="drug-name">${esc(name)}</div>
                  ${aliases ? `<div class="drug-alias">${esc(aliases)}</div>` : ''}
                  <div class="drug-class">${esc(cls)}</div>
                  <div class="drug-tags">
                    <span class="drug-tag tag-indigo">Rx</span>
                    ${isAntibiotic ? '<span class="drug-tag tag-amber">Antibiotic</span>' : ''}
                    ${isAHT ? '<span class="drug-tag tag-rose">Antihypertensive</span>' : ''}
                    ${isADM ? '<span class="drug-tag tag-emerald">Antidiabetic</span>' : ''}
                    ${/ppi|proton pump/i.test(cls) ? '<span class="drug-tag tag-amber">Acid Reducer</span>' : ''}
                    ${/nsaid/i.test(cls) ? '<span class="drug-tag tag-rose">NSAID</span>' : ''}
                  </div>
                </div>
              </div>
              <div class="drug-actions">
                <button class="drug-act primary-act" onclick="doGenerateMCQ()">📋 <span>MCQs</span></button>
                <button class="drug-act" onclick="doExportPDF()">⬇ <span>PDF</span></button>
                <button class="drug-act" onclick="doSpeak()">🔊 <span>Listen</span></button>
                <button class="drug-act" onclick="doCopy()">📋 <span>Copy</span></button>
                <button class="drug-act" onclick="doPrint()">🖨 <span>Print</span></button>
                <button class="drug-act" onclick="doSearch('${esc(name)}')">↺ <span>Refresh</span></button>
                <button class="drug-act" onclick="openCompareWithCurrent('${esc(name)}')">⚖ <span>Compare</span></button>
                <button class="drug-act fav-act ${isFavorite(name) ? '' : 'not-fav'}" onclick="toggleFavorite('${esc(name)}')" title="${isFavorite(name)?'Remove from favorites':'Add to favorites'}">${isFavorite(name) ? '⭐' : '☆'}</button>
              </div>
            </div>
          </div>`;
        }

        // ─── DRUG TABS ──────────────────────────────────
        function buildDrugTabs() {
            const tabs = ['Overview','Uses','Mechanism','PK/PD','Adverse','Contra','Dosing','Interactions','Brands','Pregnancy','Case','FAQ','Structure','References'];
            return `<div class="drug-tabs">${tabs.map((t,i) => `<span class="drug-tab" onclick="switchTab(${i})">${t}</span>`).join('')}</div>`;
        }
        function switchTab(idx) {
            document.querySelectorAll('.drug-tab').forEach((el,i) => el.classList.toggle('active', i===idx));
            document.querySelectorAll('.drug-section').forEach((el,i) => el.classList.toggle('active', i===idx));
        }

        // ─── SECTION HELPERS ─────────────────────────────
        function secCard(accent, emoji, title, body, idx) {
            return `<div class="drug-section" id="sec${idx}">
            <div class="sec-card">
              <div class="sec-head"><div class="accent-line" style="background:${accent}"></div><span class="emoji">${emoji}</span><span class="title">${title}</span></div>
              <div class="sec-body">${body}</div>
            </div>
          </div>`;
        }
        function listItems(arr, color) {
            if (!arr || !arr.length) return '<p style="color:var(--text3);font-size:12px;">No information available.</p>';
            return `<ul>${arr.map(i => `<li><span class="dot" style="background:${color}"></span>${esc(i)}</li>`).join('')}</ul>`;
        }

        function buildOverview(d) { const o = d.overview || {}; return secCard('var(--primary-light)','🧬','Overview', `<p style="margin-bottom:8px;">${esc(o.summary||'')}</p>${(o.key_points||[]).length ? `<div class="sub-label" style="color:var(--primary-light);">Key Points</div>${listItems(o.key_points,'var(--primary-light)')}` : ''}`, 0); }
        function buildUses(d) { return secCard('#10b981','💉','Therapeutic Uses', listItems(d.therapeutic_uses,'#10b981'), 1); }
        function buildMechanism(d) { return secCard('#7c3aed','⚙','Mechanism of Action', `<p>${esc(d.mechanism_of_action||'')}</p>`, 2); }
        function buildPKPD(d) {
            const pk = d.pharmacokinetics_pharmacodynamics || {};
            const fields = [['absorption','Absorption'],['distribution','Distribution'],['metabolism','Metabolism'],['elimination','Elimination'],['half_life','Half-Life'],['pharmacodynamics_notes','PD Notes']];
            return secCard('#6366f1','📊','Pharmacokinetics & Pharmacodynamics', `<div class="grid-2">${fields.filter(([k])=>pk[k]).map(([k,lbl])=>`<div class="grid-item"><div class="label">${lbl}</div><div class="value">${esc(pk[k])}</div></div>`).join('')}</div>`, 3);
        }
        function buildAdverse(d) {
            const ar = d.adverse_reactions || {};
            return secCard('#f59e0b','⚠️','Adverse Reactions', `<div class="sub-label" style="color:#fbbf24;">Common</div>${listItems(ar.common,'#f59e0b')}<div class="sub-label" style="color:#f472b6;margin-top:10px;">Serious</div>${listItems(ar.serious,'#f472b6')}${(ar.seek_medical_help_when||[]).length ? `<div class="sub-label" style="color:#f472b6;margin-top:10px;">Seek Medical Help When</div>${listItems(ar.seek_medical_help_when,'#f472b6')}` : ''}`, 4);
        }
        function buildContraindications(d) {
            const ci = d.contraindications || {};
            return secCard('#f472b6','🚫','Contraindications', `<div class="sub-label" style="color:#f472b6;">Absolute</div>${listItems(ci.absolute,'#f472b6')}<div class="sub-label" style="color:#fbbf24;margin-top:10px;">Major Cautions</div>${listItems(ci.cautions,'#f59e0b')}`, 5);
        }
        function buildAdultDosing(d) { return secCard('#3b82f6','💊','Adult Dosing', `${listItems(d.adult_dosing,'#3b82f6')}<p style="font-size:10px;color:var(--text3);margin-top:8px;font-style:italic;">⚠ Verify doses from authoritative references before prescribing.</p>`, 6); }
        function buildPediatricDosing(d) { return secCard('#06b6d4','👶','Pediatric Dosing', `${listItems(d.pediatric_dosing,'#06b6d4')}<p style="font-size:10px;color:var(--text3);margin-top:8px;font-style:italic;">⚠ Weight/age-based dosing must be verified with a qualified prescriber.</p>`, 6); }
        function buildInteractions(d) {
            const di = d.drug_interactions || {};
            const major = di.major || [], mod = di.moderate || [], notes = di.administration_notes || [];
            return secCard('#f97316','⚡','Drug Interactions', `${major.length ? `<div class="sub-label" style="color:#f472b6;">Major</div>${major.map(i => `<div class="int-row"><span class="int-badge int-major">MAJOR</span><span class="int-txt">${esc(i)}</span></div>`).join('')}` : ''}${mod.length ? `<div class="sub-label" style="color:#fbbf24;margin-top:10px;">Moderate</div>${mod.map(i => `<div class="int-row"><span class="int-badge int-mod">MODERATE</span><span class="int-txt">${esc(i)}</span></div>`).join('')}` : ''}${notes.length ? `<div class="sub-label" style="margin-top:10px;">Administration Notes</div>${listItems(notes,'#f97316')}` : ''}`, 7);
        }
        function buildPakBrands(d) {
            const brands = d.pakistan_brand_names || [];
            const bHTML = brands.length ? `<div class="brand-grid">${brands.map(b => `<div class="brand-card"><div class="bname">${esc(b.brand||'')}</div><div class="bstr">${(b.strengths||[]).join(' · ')}</div><div class="bco">${esc(b.company||'')}</div><div class="btags">${(b.dosage_forms||[]).map(f => `<span class="btag">${esc(f)}</span>`).join('')}</div></div>`).join('')}</div>` : '<p style="color:var(--text3);font-size:12px;">Brand data not available.</p>';
            return secCard('#818cf8','🇵🇰','Brand Names in Pakistan', `${bHTML}<p style="font-size:10px;color:var(--text3);margin-top:8px;">Verify brand availability with local formularies.</p>`, 8);
        }
        function buildPregnancy(d) {
            const pl = d.pregnancy_lactation || {};
            return secCard('#ec4899','🤱','Pregnancy & Lactation', `<div class="grid-2"><div class="grid-item"><div class="label" style="color:#f9a8d4;">Pregnancy</div><div class="value">${esc(pl.pregnancy||'Consult clinician.')}</div></div><div class="grid-item"><div class="label" style="color:#f9a8d4;">Lactation</div><div class="value">${esc(pl.lactation||'Consult clinician.')}</div></div></div>`, 9);
        }
        function buildRenalHepatic(d) {
            const rh = d.renal_hepatic_considerations || {};
            return secCard('#64748b','🫀','Renal & Hepatic', `<div class="grid-2"><div class="grid-item"><div class="label">Renal Impairment</div><div class="value">${esc(rh.renal||'No specific adjustment noted.')}</div></div><div class="grid-item"><div class="label">Hepatic Impairment</div><div class="value">${esc(rh.hepatic||'No specific adjustment noted.')}</div></div></div>`, 9);
        }
        function buildCounseling(d) { return secCard('#84cc16','🗣','Counseling Points', listItems(d.counseling_points,'#84cc16'), 10); }
        function buildMonitoring(d) {
            const mons = d.monitoring_parameters || [];
            return secCard('#a855f7','📈','Monitoring Parameters', mons.length ? mons.map(m => `<div class="int-row"><span style="width:5px;height:5px;border-radius:50%;background:#a855f7;flex-shrink:0;margin-top:6px;"></span><span class="int-txt">${esc(m)}</span></div>`).join('') : '<p style="color:var(--text3);font-size:12px;">No monitoring parameters listed.</p>', 10);
        }
        function buildClinicalCase(d) {
            const cc = d.related_clinical_case || {};
            return secCard('#10b981','🏥','Clinical Case', `${cc.scenario ? `<div style="background:rgba(16,185,129,0.04);border:1px solid rgba(16,185,129,0.15);border-radius:8px;padding:10px;margin-bottom:8px;"><div class="sub-label" style="color:#34d399;">Scenario</div><p style="font-size:13px;color:var(--text2);line-height:1.6;">${esc(cc.scenario)}</p></div>` : ''}${cc.discussion ? `<div style="background:rgba(99,102,241,0.04);border:1px solid rgba(99,102,241,0.15);border-radius:8px;padding:10px;margin-bottom:8px;"><div class="sub-label" style="color:#a5b4fc;">Discussion</div><p style="font-size:13px;color:var(--text2);line-height:1.6;">${esc(cc.discussion)}</p></div>` : ''}${(cc.pearls||[]).length ? `<div class="sub-label" style="color:#34d399;">Clinical Pearls</div>${listItems(cc.pearls,'#10b981')}` : ''}`, 11);
        }
        function buildFAQ(d) {
            const faqs = d.faq || [];
            return secCard('#38bdf8','❓','FAQ', `${faqs.map((f,i) => `<div class="faq-item"><div class="faq-q" onclick="toggleFaq(${i})"><span>${esc(f.question)}</span><span class="arrow" id="faqArrow${i}">▾</span></div><div class="faq-a" id="faqAns${i}">${esc(f.answer)}</div></div>`).join('')}`, 12);
        }
        function toggleFaq(i) {
            const a = document.getElementById('faqAns' + i);
            const ar = document.getElementById('faqArrow' + i);
            if (a) { const open = a.classList.toggle('open'); if (ar) ar.classList.toggle('open', open); }
        }
        function buildRefs(d) {
            const refs = d.references || [];
            const REF_URLS = { 'bnf':'https://bnf.nice.org.uk','british national formulary':'https://bnf.nice.org.uk','nice':'https://www.nice.org.uk/guidance','fda':'https://www.accessdata.fda.gov/scripts/cder/daf/','who model':'https://www.who.int/publications/i/item/9789240001114','martindale':'https://www.medicinescomplete.com/mc/martindale/current/','pubmed':'https://pubmed.ncbi.nlm.nih.gov','uptodate':'https://www.uptodate.com','drugbank':'https://go.drugbank.com','medscape':'https://reference.medscape.com','rxlist':'https://www.rxlist.com','drugs.com':'https://www.drugs.com','pakistan national formulary':'https://drap.gov.pk/formulary','drap':'https://drap.gov.pk','pubchem':'https://pubchem.ncbi.nlm.nih.gov','ema':'https://www.ema.europa.eu' };
            function getUrl(text) {
                const raw = text.match(/https?:\/\/[^\s,)]+/);
                if (raw) return raw[0];
                const lower = text.toLowerCase();
                for (const [key, url] of Object.entries(REF_URLS)) { if (lower.includes(key)) return url; }
                return `https://scholar.google.com/scholar?q=${encodeURIComponent(text.substring(0,80))}`;
            }
            return secCard('#475569','📚','References & Disclaimer', `${refs.map((r,i) => `<div class="ref-item"><span class="num">[${i+1}]</span><a href="${getUrl(r)}" target="_blank" rel="noopener noreferrer">${esc(r)}</a><span style="font-size:9px;color:var(--text3);opacity:0.5;margin-left:auto;">↗</span></div>`).join('')}<div class="disclaimer-box"><p>⚠ ${esc(d.safety_disclaimer||'Educational use only. Verify from authoritative references.')}</p></div>`, 14);
        }

        let inlineMCQState = {};
        function renderInlineMCQs(mcqs, cont) {
            cont.innerHTML = `<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:6px;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;"><span style="font-size:18px;">📋</span><span style="font-size:15px;font-weight:700;color:var(--primary-light);">MCQs — ${esc(S.currentDrug.medicine_name)}</span></div>
            ${mcqs.map((q,qi) => `<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);"><div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;">${qi+1}. ${esc(q.question)}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;">${Object.entries(q.options||{}).map(([k,v]) => `<button class="mcq-opt-inline" data-qi="${qi}" data-opt="${k}" onclick="pickInlineMCQ(${qi},'${k}','${esc(q.correct)}')" style="padding:6px 10px;background:var(--bg3);border:1.5px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;font-weight:500;text-align:left;transition:all 0.15s;"><strong>${k}.</strong> ${esc(v)}</button>`).join('')}</div><div style="margin-top:6px;"><button onclick="toggleInlineAns(${qi})" style="font-size:10px;color:var(--primary-light);background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;">▾ Show answer</button><div id="inlineAns${qi}" style="display:none;margin-top:4px;padding:6px 10px;background:rgba(16,185,129,0.05);border:1px solid rgba(16,185,129,0.12);border-radius:6px;font-size:12px;color:#34d399;">✓ Correct: <strong>${esc(q.correct)}</strong> &nbsp;—&nbsp; ${esc(q.explanation)}</div></div></div>`).join('')}

        function pickInlineMCQ(qi, chosen, correct) {
            const key = 'mcq' + qi;

                else if (el.classList.contains('show-correct')) { el.style.borderColor = 'var(--accent)'; el.style.background = 'rgba(16,185,129,0.05)'; el.style.color = '#34d399'; }
            });

        function toggleInlineAns(qi) {

        // ─── MCQ MODE (Full Page) ──────────────────────
        function openMCQMode() {

            <div class="mcq-search-box"><label>🔍 Search for a medicine to generate MCQs</label><div class="mcq-search-row"><div class="wrap"><input id="mcqSearchInp" type="text" placeholder="e.g. Metformin, Azithromycin, Omeprazole…" oninput="onMCQInput(this.value)" onkeydown="onMCQKey(event)" autocomplete="off" spellcheck="false" /><div class="nav-sugg-drop" id="mcqSuggDrop"></div></div></div>
            <div class="mcq-count-group"><span class="label">Number of MCQs:</span>${[10,20,30,40,50,60].map(n => `<button class="mcq-count-btn ${n===MCQ.selectedCount?'active':''}" onclick="setMCQCount(${n})">${n}</button>`).join('')}</div>
            <button class="mcq-generate" id="mcqGenBtn" onclick="generateMCQs()" disabled>🚀 Generate MCQs</button><div style="font-size:10px;color:var(--text3);text-align:center;margin-top:4px;">Enter a medicine above, then click Generate</div></div>

        let mcqDebounceTimer, mcqSuggIdx = 0;
        async function onMCQInput(val) {

            if (e.key === 'ArrowDown') { e.preventDefault();
                mcqSuggIdx = Math.min(mcqSuggIdx + 1, items.length - 1);
                items.forEach((it, i) => it.classList.toggle('sel', i === mcqSuggIdx)); } else if (e.key === 'ArrowUp') { e
                    .preventDefault();
                mcqSuggIdx = Math.max(mcqSuggIdx - 1, -1);
                items.forEach((it, i) => it.classList.toggle('sel', i === mcqSuggIdx)); } else if (e.key === 'Enter') { e
                    .preventDefault(); if (mcqSuggIdx >= 0 && items[mcqSuggIdx]) items[mcqSuggIdx].dispatchEvent(new
                        MouseEvent('mousedown'));
                else { const val = document.getElementById('mcqSearchInp')?.value.trim(); if (val) { MCQ.medicine = val;

        async function generateMCQs() {
            const medicine = MCQ.medicine.trim() || document.getElementById('mcqSearchInp')?.value.trim();
            if (!medicine) { alert('Please search and select a medicine first.'); return; }
            if (MCQ.isGenerating) return;
            MCQ.isGenerating = true;
            MCQ.isComplete = false;
            MCQ.currentIndex = 0;
            MCQ.score = 0;
            MCQ.answered = false;
            const container = document.getElementById('mcqQuizContainer');
            if (!container) return;
            container.innerHTML =
                `<div class="mcq-loading"><div class="spinner"></div><p>Generating ${MCQ.selectedCount} MCQs for <strong>${esc(medicine)}</strong>…</p></div>`;

                const mcqData = await fetchMCQsFromAI(medicine, MCQ.selectedCount);
                if (!mcqData || !mcqData.length) throw new Error('No MCQs generated.');
                MCQ.mcqs = mcqData;
                MCQ.total = mcqData.length;

                    `<div style="background:rgba(244,114,182,0.06);border:1px solid rgba(244,114,182,0.15);border-radius:var(--radius);padding:20px;text-align:center;"><div style="font-size:24px;margin-bottom:4px;">⚠️</div><div style="font-size:15px;font-weight:600;color:#f472b6;">Generation Failed</div><div style="font-size:12px;color:var(--text3);margin:4px 0 12px;">${esc(err.message||'Unknown error')}</div><button onclick="generateMCQs()" style="padding:6px 16px;background:rgba(79,70,229,0.08);border:1px solid rgba(79,70,229,0.2);border-radius:6px;color:var(--primary-light);cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;">↺ Retry</button></div>`;
            } finally { MCQ.isGenerating = false; }

        async function fetchMCQsFromAI(medicine, count) {
            const prompt = `Generate ${count} pharmacology MCQs about "${medicine}" for pharmacy students. Cover: mechanism, dosing, interactions, adverse effects, contraindications, clinical use, PK. Return ONLY valid JSON array, no markdown, no backticks: [{"question":"...","options":{"A":"...","B":"...","C":"...","D":"..."},"correct":"A","explanation":"..."}] Keep explanations under 30 words. Ensure exactly 4 options (A-D).`;
            const data = await callGroqViaWorker({ messages: [{ role: 'user', content: prompt }], max_tokens: 4096,
                temperature: 0.2 });
            let raw = data.choices?.[0]?.message?.content || '';
            raw = raw.trim().replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/\s*```$/, '').trim();
            const s = raw.indexOf('['), e = raw.lastIndexOf(']');
            if (s === -1 || e === -1 || e <= s) throw new Error('No JSON array found.');
            const jsonStr = raw.slice(s, e + 1);
            try {
                const parsed = JSON.parse(jsonStr);
                if (Array.isArray(parsed)) { const valid = parsed.every(q => q.question && q.options && q.correct && q
                        .explanation); if (valid) return parsed; else throw new Error('Invalid MCQ structure.'); }
                throw new Error('Not an array.');
            } catch (parseErr) {
                const repaired = jsonStr.replace(/,\s*([}\]])/g, '$1');
                try { const parsed = JSON.parse(repaired); if (Array.isArray(parsed)) return parsed; } catch (e2) { throw new Error(
                        `JSON parse error: ${parseErr.message}`); }
            }
        }

        let mcqTimeoutId = null;
        function renderMCQQuestion() {
            const container = document.getElementById('mcqQuizContainer');
            if (!container) return;
            if (MCQ.isComplete) { renderMCQResults(container); return; }
            if (!MCQ.mcqs.length || MCQ.currentIndex >= MCQ.mcqs.length) { MCQ.isComplete = true;
                renderMCQResults(container); return; }
            const q = MCQ.mcqs[MCQ.currentIndex];
            const total = MCQ.mcqs.length;
            const idx = MCQ.currentIndex;
            const score = MCQ.score;
            container.innerHTML = `<div class="mcq-quiz"><div class="qhead"><div class="score">🎯 ${score} <span>/ ${idx} answered</span></div><div class="progress">Question <strong>${idx+1}</strong> of <strong>${total}</strong></div></div>
            <div class="qtext">${esc(q.question)}</div><div class="opts" id="mcqOpts">${Object.entries(q.options||{}).map(([k,v]) => `<button class="opt" data-opt="${k}" onclick="answerMCQ(${idx},'${k}')" disabled><span class="lbl">${k}</span><span>${esc(v)}</span></button>`).join('')}</div>
            <div class="fb" id="mcqFB"></div><div class="hint" id="mcqHint">Click an option to answer.</div></div>`;
            setTimeout(() => { document.querySelectorAll('.mcq-quiz .opt').forEach(el => el.disabled = false); }, 30);

            MCQ._currentQuestionIdx = idx;

        // ─── MCQ ANSWER (NO KEYBOARD) ──────────────────
        let mcqAudioCtx = null;

        function getMCQAudio() {
            if (!mcqAudioCtx) { mcqAudioCtx = new(window.AudioContext || window.webkitAudioContext)(); }
            return mcqAudioCtx;
        }

        function playMCQSound(correct) {
            try {
                const ctx = getMCQAudio();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                gain.gain.value = 0.10;
                if (correct) {
                    osc.frequency.setValueAtTime(523, ctx.currentTime);
                    osc.frequency.setValueAtTime(659, ctx.currentTime + 0.08);
                    osc.frequency.setValueAtTime(784, ctx.currentTime + 0.16);
                    osc.type = 'sine';
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.3);
                } else {
                    osc.frequency.setValueAtTime(440, ctx.currentTime);
                    osc.frequency.setValueAtTime(349, ctx.currentTime + 0.10);
                    osc.frequency.setValueAtTime(262, ctx.currentTime + 0.20);
                    osc.type = 'sine';
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.32);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.32);
                }
            } catch (e) {}
        }

        function answerMCQ(idx, choice) {
            if (MCQ.answered || MCQ.isComplete) return;
            if (idx !== MCQ.currentIndex) return;
            if (!MCQ.mcqs.length || idx >= MCQ.mcqs.length) return;
            const q = MCQ.mcqs[idx];
            const correct = q.correct;
            const isCorrect = choice === correct;
            const btns = document.querySelectorAll('.mcq-quiz .opt');
            btns.forEach(el => {
                el.disabled = true;
                const opt = el.dataset.opt;
                if (opt === correct) { el.classList.add('show-correct');
                    el.style.borderColor = 'var(--accent)';
                    el.style.background = 'rgba(16,185,129,0.05)';
                    el.style.color = '#34d399'; }
                if (opt === choice && !isCorrect) { el.classList.add('wrong');
                    el.style.borderColor = 'var(--rose)';
                    el.style.background = 'rgba(244,114,182,0.06)';
                    el.style.color = '#f472b6'; }
                if (opt === choice && isCorrect) { el.classList.add('correct');
                    el.style.borderColor = 'var(--accent)';
                    el.style.background = 'rgba(16,185,129,0.08)';
                    el.style.color = '#34d399'; }
            });
            const fb = document.getElementById('mcqFB');
            if (fb) {
                if (isCorrect) { fb.className = 'fb correct';
                    fb.innerHTML = `✅ <strong>Correct!</strong> ${esc(q.explanation)}`;
                    playMCQSound(true);
                    MCQ.score++; } else { fb.className = 'fb wrong';
                    fb.innerHTML =
                        `❌ <strong>Wrong.</strong> Correct answer is <strong>${correct}</strong>.<br/><span class="explain">${esc(q.explanation)}</span>`;
                    playMCQSound(false); }
            }
            MCQ.answered = true;
            const total = MCQ.mcqs.length;
            const scoreEl = document.querySelector('.mcq-quiz .score');
            if (scoreEl) { scoreEl.innerHTML = `🎯 ${MCQ.score} <span>/ ${idx+1} answered</span>`; }
            const hint = document.getElementById('mcqHint');
            if (hint) { hint.textContent = isCorrect ? '✅ Correct! Moving to next…' : '❌ Showing correct answer…'; }
            if (mcqTimeoutId) clearTimeout(mcqTimeoutId);
            mcqTimeoutId = setTimeout(() => {
                mcqTimeoutId = null;
                MCQ.currentIndex++;
                if (MCQ.currentIndex >= total) { MCQ.isComplete = true;
                    renderMCQQuestion(); } else { renderMCQQuestion(); }
            }, isCorrect ? 700 : 1100);
        }

        function renderMCQResults(container) {
            const total = MCQ.mcqs.length;
            const score = MCQ.score;
            const pct = total ? Math.round((score / total) * 100) : 0;
            let msg = '',
                emoji = '';
            if (pct >= 90) { msg = 'Excellent! You\'re a pharmacology star! 🌟';
                emoji = '🏆'; } else if (pct >= 70) { msg = 'Great job! Keep mastering! 💪';
                emoji = '📚'; } else if (pct >= 50) { msg = 'Keep reviewing the topics you missed. 📖';
                emoji = '🤔'; } else { msg = 'Keep studying! Try again to improve. 🔄';

        // ─── TOGGLE FAVORITE ────────────────────────────
        function toggleFavorite(name) {
            let favs = loadFavorites();
            const idx = favs.findIndex(f => f.name.toLowerCase() === name.toLowerCase());
            if (idx === -1) favs.unshift({ name, data: S.currentDrug, time: Date.now() });
            else favs.splice(idx, 1);
            saveFavorites(favs);
            updateBadges();
            renderDrawerContent();
            const btn = document.querySelector('.fav-act');
            if (btn) {
                const isFav = isFavorite(name);
                btn.textContent = isFav ? '⭐' : '☆';
                btn.classList.toggle('not-fav', !isFav);
                btn.title = isFav ? 'Remove from favorites' : 'Add to favorites';

        // ─── STATS ──────────────────────────────────────
        function trackSearch(name) {
            try {
                let counts = JSON.parse(localStorage.getItem('pharma_counts') || '{}');
                const key = name.toLowerCase();
                counts[key] = (counts[key] || 0) + 1;
                localStorage.setItem('pharma_counts', JSON.stringify(counts));
                let total = parseInt(localStorage.getItem('pharma_total') || '0');
                total++;
                localStorage.setItem('pharma_total', total);
            } catch (e) {}
        }

        function getUsageStats() {
            try {
                const total = parseInt(localStorage.getItem('pharma_total') || '0');
                const counts = JSON.parse(localStorage.getItem('pharma_counts') || '{}');
                const unique = Object.keys(counts).length;
                const favs = loadFavorites().length;
                const topDrugs = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 7)
                    .map(([name, cnt]) => ({ name, cnt }));
                return { total, unique, favs, topDrugs };
            } catch (e) { return { total: 0, unique: 0, favs: 0, topDrugs: [] }; }
        }

                <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:700;color:var(--accent);">${S.history.length}</div>
                <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;">History</div>
              </div>
            </div>
            ${stats.topDrugs.length ? `
              <div style="margin-bottom:14px;">
                <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;">Most Searched</div>
                ${stats.topDrugs.map((d,i) => `
                  <div style="display:flex;align-items:center;gap:10px;padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:4px;cursor:pointer;" onclick="closeStatsModal();doSearch('${esc(d.name)}')">
                    <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;color:var(--primary-light);min-width:20px;">#${i+1}</span>

                    <div style="width:60px;height:3px;background:rgba(79,70,229,0.12);border-radius:2px;overflow:hidden;">
                      <div style="height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:2px;width:${Math.round((d.cnt/maxCnt)*100)}%;"></div>
                    </div>
                  </div>`).join('')}
              </div>` : '<p style="color:var(--text3);font-size:13px;text-align:center;padding:16px;">No data yet. Start searching!</p>'}
            <button onclick="if(confirm('Clear all statistics?')){localStorage.removeItem('pharma_counts');localStorage.removeItem('pharma_total');renderStatsContent();updateBadges();}" style="width:100%;padding:8px;background:rgba(244,114,182,0.06);border:1px solid rgba(244,114,182,0.15);border-radius:8px;color:#f472b6;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;">🗑 Clear Statistics</button>
          `;
        }

        // ─── COMPARE ──────────────────────────────────────
        let cmpState = { idxA: -1, idxB: -1 };

        function openCompareModal() {
            document.getElementById('compareModal').style.display = 'flex';
            document.getElementById('cmpA').value = '';
            document.getElementById('cmpB').value = '';
            document.getElementById('compareResult').innerHTML = '';
            ['cmpSuggA', 'cmpSuggB'].forEach(id => { const d = document.getElementById(id); if (d) d.style.display =
                    'none'; });
            setTimeout(() => { document.getElementById('cmpA').focus(); }, 100);
        }

        function closeCompareModal() {
            document.getElementById('compareModal').style.display = 'none';
        }

        function openCompareWithCurrent(name) {
            openCompareModal();
            document.getElementById('cmpA').value = name;
            setTimeout(() => { document.getElementById('cmpB').focus(); }, 100);
        }

        async function doCompare() {
            const nameA = document.getElementById('cmpA').value.trim();
            const nameB = document.getElementById('cmpB').value.trim();
            if (!nameA || !nameB) { alert('Please enter both drug names.'); return; }

            const result = document.getElementById('compareResult');
            result.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);">⏳ Comparing…</div>';

            const prompt =
                `Compare "${nameA}" vs "${nameB}" for a medical professional. Return ONLY valid JSON:
            {"drug_a":"${nameA}","drug_b":"${nameB}","rows":[
              {"label":"Drug Class","a":"...","b":"..."},
              {"label":"Mechanism","a":"...","b":"..."},
              {"label":"Main Uses","a":"...","b":"..."},
              {"label":"Dosing","a":"...","b":"..."},
              {"label":"Common Side Effects","a":"...","b":"..."},
              {"label":"Serious Risks","a":"...","b":"..."},
              {"label":"Contraindications","a":"...","b":"..."},
              {"label":"Half-Life","a":"...","b":"..."},
              {"label":"Pregnancy","a":"...","b":"..."},
              {"label":"Key Advantage","a":"...","b":"..."}
            ]}`;

            try {
                const data = await callGroqViaWorker({ messages: [{ role: 'user', content: prompt }], max_tokens: 1500,
                    temperature: 0.2 });
                let raw = data.choices?.[0]?.message?.content || '';
                raw = raw.replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/\s*```$/, '').trim();
                const s = raw.indexOf('{'), e = raw.lastIndexOf('}');
                const cmp = JSON.parse(s !== -1 && e !== -1 ? raw.slice(s, e + 1) : raw);

                const rows = (cmp.rows || []).map(r =>
                    `<tr><td style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;padding:8px 10px;">${esc(r.label)}</td><td style="padding:8px 10px;color:var(--text2);font-size:13px;">${esc(r.a)}</td><td style="padding:8px 10px;color:var(--text2);font-size:13px;">${esc(r.b)}</td></tr>`
                ).join('');

                result.innerHTML = `
                <div style="overflow-x:auto;margin-top:6px;">
                  <table style="width:100%;border-collapse:collapse;font-size:13px;">
                    <thead><tr>
                      <th style="text-align:left;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:0.7px;color:var(--text3);border-bottom:2px solid var(--border2);">Parameter</th>
                      <th style="text-align:left;padding:8px 10px;font-size:13px;font-weight:700;color:var(--primary-light);border-bottom:2px solid var(--border2);">💊 ${esc(cmp.drug_a||'A')}</th>
                      <th style="text-align:left;padding:8px 10px;font-size:13px;font-weight:700;color:var(--secondary);border-bottom:2px solid var(--border2);">💉 ${esc(cmp.drug_b||'B')}</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                  </table>
                </div>
                <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">
                  <button onclick="doSearch('${esc(cmp.drug_a||'')}');closeCompareModal();" style="flex:1;padding:6px 14px;background:rgba(79,70,229,0.06);border:1px solid rgba(79,70,229,0.15);border-radius:8px;color:var(--primary-light);cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;">Open ${esc(cmp.drug_a||'A')}</button>
                  <button onclick="doSearch('${esc(cmp.drug_b||'')}');closeCompareModal();" style="flex:1;padding:6px 14px;background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.15);border-radius:8px;color:var(--secondary);cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;">Open ${esc(cmp.drug_b||'B')}</button>
                </div>`;
            } catch (err) {
                result.innerHTML =
                    `<div style="padding:16px;text-align:center;color:#f472b6;">⚠ Comparison failed: ${esc(err.message||'Please try again.')}</div>`;
            }
        }

        function onCmpInput(inputId, dropId) {
            const inp = document.getElementById(inputId);
            const drop = document.getElementById(dropId);
            if (!inp || !drop) return;
            const val = inp.value.trim();
            if (!val) { drop.style.display = 'none'; return; }
            const isA = inputId === 'cmpA';
            clearTimeout(isA ? cmpDebounceA : cmpDebounceB);
            const timer = setTimeout(async () => {
                const results = await fetchSuggestions(val);
                if (!results.length) { drop.style.display = 'none'; return; }
                if (isA) cmpState.idxA = -1;
                else cmpState.idxB = -1;
                drop.innerHTML = results.map((m, i) =>
                    `<div class="nav-sugg-item" onmousedown="pickCmp('${inputId}','${dropId}','${m.name.replace(/'/g,"\\'")}')">
                💊 ${m.name}
                <span class="nav-sugg-cls">${m.cls||''}</span>
              </div>`
                ).join('');
                drop.style.display = 'block';
            }, 200);
            if (isA) cmpDebounceA = timer;
            else cmpDebounceB = timer;
        }

        let cmpDebounceA, cmpDebounceB;

        function pickCmp(inputId, dropId, name) {
            const inp = document.getElementById(inputId);
            const drop = document.getElementById(dropId);
            if (inp) inp.value = name;
            if (drop) drop.style.display = 'none';
        }

        function onCmpKey(e, inputId, dropId) {
            const drop = document.getElementById(dropId);
            if (!drop || drop.style.display === 'none') { if (e.key === 'Enter') doCompare(); return; }
            const items = drop.querySelectorAll('.nav-sugg-item');
            const isA = inputId === 'cmpA';
            let idx = isA ? cmpState.idxA : cmpState.idxB;
            if (e.key === 'ArrowDown') { e.preventDefault();
                idx = Math.min(idx + 1, items.length - 1); } else if (e.key === 'ArrowUp') { e.preventDefault();
                idx = Math.max(idx - 1, -1); } else if (e.key === 'Enter') { e.preventDefault(); if (idx >= 0 && items[
                    idx]) items[idx].dispatchEvent(new MouseEvent('mousedown'));
                else doCompare(); return; } else if (e.key === 'Escape') { drop.style.display = 'none'; return; }
            if (isA) cmpState.idxA = idx;
            else cmpState.idxB = idx;
            items.forEach((it, i) => it.classList.toggle('sel', i === idx));
        }

        // ─── PILL FINDER ────────────────────────────────

              <div id="pillResult" style="margin-top:20px;"></div>
            </div>`;
            setTimeout(() => { const inp = document.getElementById('pillDesc'); if (inp) inp.focus(); }, 200);

        async function identifyPill() {
            const input = document.getElementById('pillDesc');
            const resultDiv = document.getElementById('pillResult');
            const desc = input?.value.trim();

                const data = await callGroqViaWorker({ messages: [{ role: 'user', content: prompt }], max_tokens: 300,

                if (result.error) { resultDiv.innerHTML =

                resultDiv.innerHTML =
                    `<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;box-shadow:var(--glow);"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;"><div><div style="font-size:20px;font-weight:800;color:var(--text);">${esc(result.name)}</div><div style="font-size:13px;color:var(--primary-light);font-weight:600;">${esc(result.class)}</div></div><div style="background:rgba(79,70,229,0.08);padding:4px 12px;border-radius:12px;border:1px solid var(--border);font-size:11px;color:var(--text3);">💊 Identified</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;"><div style="background:var(--bg3);border-radius:8px;padding:10px;"><div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;">Strengths</div><div style="font-size:13px;color:var(--text2);">${(result.strengths||[]).join(' · ')||'N/A'}</div></div><div style="background:var(--bg3);border-radius:8px;padding:10px;"><div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;">Brands (PK)</div><div style="font-size:13px;color:var(--text2);">${(result.brands||[]).join(' · ')||'N/A'}</div></div></div><div style="margin-top:10px;padding:8px 12px;background:rgba(56,189,248,0.05);border-left:3px solid var(--sky);border-radius:4px;"><div style="font-size:10px;font-weight:600;color:var(--sky);">Common Use</div><div style="font-size:13px;color:var(--text2);">${esc(result.common_use||'')}</div></div>${result.warning ? `<div style="margin-top:8px;padding:6px 12px;background:rgba(245,158,11,0.06);border-left:3px solid var(--secondary);border-radius:4px;font-size:11px;color:rgba(245,158,11,0.8);">⚠️ ${esc(result.warning)}</div>` : ''}<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;"><button onclick="doSearch('${esc(result.name)}');" style="padding:4px 14px;background:rgba(79,70,229,0.06);border:1px solid rgba(79,70,229,0.15);border-radius:6px;color:var(--primary-light);cursor:pointer;font-size:11px;font-weight:600;">🔍 Full Details</button><button onclick="document.getElementById('pillDesc').value='';document.getElementById('pillResult').innerHTML='';document.getElementById('pillDesc').focus();" style="padding:4px 14px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text3);cursor:pointer;font-size:11px;">↺ New</button></div></div>`;
            } catch (err) {

          <h2>Pediatric Dosing</h2><ul>${(d.pediatric_dosing||[]).map(dd=>`<li>${esc(dd)}</li>`).join('')}</ul>
          <h2>Drug Interactions</h2><h3>Major</h3><ul>${(d.drug_interactions?.major||[]).map(i=>`<li>${esc(i)}</li>`).join('')}</ul><h3>Moderate</h3><ul>${(d.drug_interactions?.moderate||[]).map(i=>`<li>${esc(i)}</li>`).join('')}</ul>
          <h2>Brands in Pakistan</h2>${(d.pakistan_brand_names||[]).map(b=>`<span class="brand"><strong>${esc(b.brand)}</strong> ${(b.strengths||[]).join('/')} — ${esc(b.company)}</span>`).join(' ')}
          <h2>Pregnancy & Lactation</h2><p><strong>Pregnancy:</strong> ${esc(d.pregnancy_lactation?.pregnancy||'')}</p><p><strong>Lactation:</strong> ${esc(d.pregnancy_lactation?.lactation||'')}</p>
          <h2>Counseling Points</h2><ul>${(d.counseling_points||[]).map(p=>`<li>${esc(p)}</li>`).join('')}</ul>
          <h2>Monitoring</h2><ul>${(d.monitoring_parameters||[]).map(m=>`<li>${esc(m)}</li>`).join('')}</ul>
          <h2>References</h2><ul>${(d.references||[]).map(r=>`<li>${esc(r)}</li>`).join('')}</ul>
          <div class="disc">⚠ ${esc(d.safety_disclaimer||'Educational use only. Verify from authoritative references.')}</div>
          <div class="footer">PharmaPulse — Pakistan Drug Intelligence Assistant</div></body></html>`);
            win.document.close();
            setTimeout(() => { try { win.print(); } catch (e) {} }, 600);
        }

        function doPrint() { window.print(); }

        function doSpeak() {
            if (!S.currentDrug) return;
            window.speechSynthesis.cancel();
            const d = S.currentDrug;
            const txt = `${d.medicine_name}. ${d.drug_class}. ${d.overview?.summary||''}`;
            const utt = new SpeechSynthesisUtterance(txt);
            utt.rate = 0.85;
            utt.lang = 'en-US';
            window.speechSynthesis.speak(utt);
        }

        function doCopy() {
            if (!S.currentDrug) return;
            const d = S.currentDrug;
            const txt = [
                `${d.medicine_name}`,
                `Class: ${d.drug_class}`,
                '',
                d.overview?.summary || '',
                '',
                `Uses: ${(d.therapeutic_uses||[]).slice(0,4).join(', ')}`,
                '',
                `Pakistan Brands: ${(d.pakistan_brand_names||[]).slice(0,3).map(b=>b.brand).join(', ')}`,
                '',
                '— PharmaPulse · Pakistan Drug Intelligence'
            ].join('\n');
            navigator.clipboard.writeText(txt)
                .then(() => alert('Summary copied!'))
                .catch(() => prompt('Copy this text:', txt));
        }

        // ─── UTILITY ──────────────────────────────────────
        function esc(s) {
            if (s == null) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#x27;');
        }

        // ─── EXPOSE GLOBALS ──────────────────────────────
        window.newSearch = newSearch;
        window.doSearch = doSearch;
        window.setMode = setMode;
        window.toggleTheme = toggleTheme;
        window.openDrawer = openDrawer;
        window.closeDrawer = closeDrawer;
        window.openStatsModal = openStatsModal;
        window.closeStatsModal = closeStatsModal;
        window.openCompareModal = openCompareModal;
        window.closeCompareModal = closeCompareModal;
        window.doCompare = doCompare;
        window.openCompareWithCurrent = openCompareWithCurrent;
        window.onCmpInput = onCmpInput;
        window.onCmpKey = onCmpKey;
        window.pickCmp = pickCmp;
        window.viewStructure = viewStructure;
        window.doGenerateMCQ = doGenerateMCQ;
        window.doExportPDF = doExportPDF;
        window.doPrint = doPrint;
        window.doSpeak = doSpeak;
        window.doCopy = doCopy;
        window.toggleFavorite = toggleFavorite;
        window.openFavItem = openFavItem;
        window.removeFav = removeFav;
        window.openFromHist = openFromHist;
        window.triggerNavSearch = triggerNavSearch;
        window.onNavInput = onNavInput;
        window.onNavKey = onNavKey;
        window.switchTab = switchTab;
        window.toggleFaq = toggleFaq;
        window.pickInlineMCQ = pickInlineMCQ;
        window.toggleInlineAns = toggleInlineAns;
        window.openMCQMode = openMCQMode;
        window.exitMCQMode = exitMCQMode;
        window.onMCQInput = onMCQInput;
        window.onMCQKey = onMCQKey;
        window.selectMCQItem = selectMCQItem;
        window.setMCQCount = setMCQCount;
        window.generateMCQs = generateMCQs;
        window.answerMCQ = answerMCQ;
        window.openPillFinder = openPillFinder;
        window.identifyPill = identifyPill;
        window.switchStructureView = switchStructureView;

        // ─── STRUCTURE VIEWER: auto-load on drug page ──
        // We will call this after rendering drug page
        // We can hook into renderDrugPage to call fetchStructureImage
        // But we already have a buildStructure that creates the DOM.
        // After rendering, we need to trigger the fetch.
        // We'll modify renderDrugPage to include a call to load structure.

        // Override renderDrugPage to also load structure
        const originalRenderDrugPage = renderDrugPage;
        renderDrugPage = function(d) {
            originalRenderDrugPage(d);
            // After rendering, load structure for the current drug
            setTimeout(() => {
                const name = S.currentDrug?.medicine_name;
                if (name) {
                    // Default to 2D
                    fetchStructureImage(name, '2d');
                }
            }, 100);
        };

        console.log('✅ PharmaPulse — Fully fixed with structure viewer, pill finder, and worker proxy!');
        console.log('🌐 All API calls go through Cloudflare Worker.');
        console.log('📱 Fully responsive & mobile friendly.');
        console.log('🧪 Structure viewer uses PubChem API.');
    </script>
</body>
</html>
